:root {
  --sb-bg: #0f172a; --sb-bg-2: #1e293b; --sb-fg: #cbd5e1; --sb-dim: #64748b;
  --accent: #6366f1; --accent-bg: rgba(99,102,241,0.16);
  --bg: #f6f7fb; --card: #ffffff; --border: #e4e7ec;
  --text: #0f172a; --dim: #64748b;
  --good: #10b981; --warn: #f59e0b; --bad: #ef4444;
  --invariant: #0ea5e9; --tactical: #f59e0b; --compositional: #a855f7;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  color: var(--text); background: var(--bg);
  font-size: 14px; display: flex; overflow: hidden;
}
.sidebar { width: 280px; background: var(--sb-bg); color: var(--sb-fg); flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
.sb-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--sb-bg-2); }
.sb-title { font-size: 15px; font-weight: 700; color: #f1f5f9; margin: 0; display: flex; align-items: center; gap: 8px; }
.sb-title::before { content: ''; width: 8px; height: 8px; border-radius: 2px; background: var(--accent); display: inline-block; }
.sb-sub { font-size: 11px; color: var(--sb-dim); margin-top: 4px; letter-spacing: 0.4px; text-transform: uppercase; font-variant-numeric: tabular-nums; }
.sb-hublink { display: block; font-size: 11px; color: var(--sb-dim); padding: 8px 20px; text-decoration: none; border-bottom: 1px solid var(--sb-bg-2); }
.sb-hublink:hover { color: var(--accent); }
.sb-hublink .arrow { float: right; }
.nav { flex: 1; overflow-y: auto; padding: 6px 0 10px; }
.nav::-webkit-scrollbar { width: 6px; }
.nav::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
.nav-section { margin-bottom: 1px; }
.nav-head { display: flex; align-items: center; gap: 10px; padding: 9px 16px 9px 18px; cursor: pointer; user-select: none; font-size: 12.5px; font-weight: 600; color: #e2e8f0; }
.nav-head:hover { background: rgba(255,255,255,0.04); }
.nav-head .chev { margin-left: auto; color: var(--sb-dim); font-size: 9px; transition: transform 0.15s; }
.nav-section.collapsed .chev { transform: rotate(-90deg); }
.nav-section.collapsed .nav-items { display: none; }
.nav-items { padding: 2px 0 6px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 18px 6px 42px; cursor: pointer; font-size: 12.5px; color: var(--sb-fg); border-left: 2px solid transparent; }
.nav-item:hover { background: rgba(255,255,255,0.04); color: #f1f5f9; }
.nav-item.active { color: #f1f5f9; background: var(--accent-bg); border-left-color: var(--accent); font-weight: 500; }
.nav-direct { padding: 9px 18px; cursor: pointer; font-size: 12.5px; color: #e2e8f0; font-weight: 600; border-left: 2px solid transparent; display: flex; gap: 10px; align-items: center; }
.nav-direct:hover { background: rgba(255,255,255,0.04); }
.nav-direct.active { background: var(--accent-bg); border-left-color: var(--accent); }
.badge { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: #334155; color: #cbd5e1; margin-left: auto; font-weight: 500; }
.badge-accent { background: var(--accent-bg); color: #c7d2fe; }
.badge-warn { background: #78350f; color: #fcd34d; }
.badge-bad { background: #7f1d1d; color: #fca5a5; }
.sb-foot { padding: 12px 18px; border-top: 1px solid var(--sb-bg-2); font-size: 11px; color: var(--sb-dim); }

.content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { height: 56px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0; }
.crumbs { font-size: 13px; color: var(--dim); display: flex; gap: 6px; align-items: center; }
.crumbs strong { color: var(--text); font-weight: 600; }
.crumbs .sep { color: #cbd5e1; }
.tr { margin-left: auto; display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--dim); }
.tstat { display: flex; gap: 5px; align-items: center; }
.tstat strong { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
.tstat-sep { color: #cbd5e1; }
.main { flex: 1; overflow-y: auto; padding: 22px 24px; }
.main::-webkit-scrollbar { width: 8px; }
.main::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

.page-h { margin-bottom: 18px; }
.page-t { font-size: 20px; font-weight: 700; margin: 0 0 4px; }
.page-d { font-size: 13px; color: var(--dim); margin: 0; max-width: 880px; line-height: 1.55; }
.page-d code { background: #eef2ff; color: #3730a3; padding: 1px 5px; border-radius: 3px; font-size: 12px; }

.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
@media (max-width: 1100px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
.kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 13px 16px; }
.kpi-l { font-size: 11px; color: var(--dim); text-transform: uppercase; font-weight: 600; letter-spacing: 0.4px; }
.kpi-v { font-size: 22px; font-weight: 700; margin-top: 3px; font-variant-numeric: tabular-nums; }
.kpi-s { font-size: 11.5px; color: var(--dim); margin-top: 2px; }
.kpi-accent { border-left: 3px solid var(--accent); }
.kpi-warn { border-left: 3px solid var(--warn); }
.kpi-bad { border-left: 3px solid var(--bad); }
.kpi-good { border-left: 3px solid var(--good); }

.chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 4px; margin-bottom: 14px; }
.chart-head { padding: 10px 14px 2px; }
.chart-t { font-size: 13.5px; font-weight: 600; margin: 0; }
.chart-s { font-size: 12px; color: var(--dim); margin-top: 2px; line-height: 1.45; }
.chart-body { padding: 4px; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 1100px) { .row2, .row3 { grid-template-columns: 1fr; } }

.rt-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.rt-tbl th { text-align: left; font-size: 11px; text-transform: uppercase; color: var(--dim); font-weight: 600; padding: 10px 12px; border-bottom: 1px solid var(--border); letter-spacing: 0.4px; background: #f8fafc; }
.rt-tbl td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; font-variant-numeric: tabular-nums; }
.rt-tbl tr:last-child td { border-bottom: 0; }
.rt-tbl .hl { background: #eef2ff; font-weight: 600; }

.alert { display: flex; gap: 10px; padding: 10px 12px; border-left: 3px solid var(--warn); background: #fffbeb; border-radius: 4px; margin-bottom: 10px; font-size: 13px; line-height: 1.55; }
.alert.bad { border-left-color: var(--bad); background: #fef2f2; }
.alert.good { border-left-color: var(--good); background: #f0fdf4; }
.alert.info { border-left-color: var(--accent); background: #eef2ff; }
.alert strong { margin-right: 4px; }
.alert code { background: rgba(0,0,0,0.05); padding: 1px 5px; border-radius: 3px; font-size: 12px; }

.sec-title { font-size: 12px; font-weight: 700; color: var(--dim); margin: 18px 0 10px; padding-top: 6px; border-top: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
.sec-title:first-of-type { border-top: 0; padding-top: 0; margin-top: 6px; }

.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.pill-good { background: #d1fae5; color: #065f46; }
.pill-warn { background: #fef3c7; color: #92400e; }
.pill-bad { background: #fee2e2; color: #991b1b; }
.pill-accent { background: #e0e7ff; color: #3730a3; }
.pill-inv { background: #e0f2fe; color: #075985; }
.pill-tac { background: #fef3c7; color: #92400e; }
.pill-cmp { background: #f3e8ff; color: #6b21a8; }

.controls { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
.ctl { display: flex; align-items: center; gap: 8px; }
.ctl label { font-size: 11px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: 0.4px; }
.ctl-radio { display: flex; gap: 4px; }
.ctl-radio label { cursor: pointer; padding: 5px 10px; background: #f1f5f9; border-radius: 5px; font-size: 12px; color: var(--text); text-transform: none; letter-spacing: 0; font-weight: 500; border: 1px solid transparent; }
.ctl-radio label:hover { background: #e2e8f0; }
.ctl-radio label.active { background: #1e293b; color: white; border-color: #1e293b; }
.ctl-radio input { display: none; }

.callout { background: #f8fafc; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 12px 14px; margin: 8px 0 14px; font-size: 13px; line-height: 1.55; color: #334155; }
.callout strong { color: var(--text); }
.callout .ttl { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

@media (max-width: 720px) { .sidebar { width: 240px; } .tr { display: none; } }
</style>

  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

ROUTES['calibration/dual'] = () => {
  const m = main();
  m.appendChild(pageHeader(
    'Dual signal check — fraud rate vs mean score',
    `When realized fraud rate moves in your OOT window, the model's average score should move in the same direction with comparable magnitude. If fraud rate doubles and scores barely budge, the model is missing the new pattern — even if AUC measured on labels-you-eventually-got looks fine, because labels back-fill.`
  ));

  // Normalize both to z-scores around their pre-shift baseline (first 60 days)
  const baseline = (arr, n) => { const m = arr.slice(0, n).reduce((a, b) => a + b, 0) / n; const s = Math.sqrt(arr.slice(0, n).reduce((a, b) => a + (b - m) ** 2, 0) / n); return arr.map(v => (v - m) / s); };
  const z_fraud = baseline(daily.map(d => d.fraud_rate), 60);
  const z_score = baseline(daily.map(d => d.mean_score), 60);

  const c1 = chartCard('Fraud rate (z) vs mean model score (z) · 7-day smoothed',
    'Both series should track each other inside the OOT window. Where the red line lifts and the purple line lags, the model is failing to react to the new signal.');
  m.appendChild(c1.wrap);
  const sm = (a, w = 7) => a.map((_, i) => { const lo = Math.max(0, i - w + 1); const sl = a.slice(lo, i + 1); return sl.reduce((x, y) => x + y, 0) / sl.length; });
  Plotly.newPlot(c1.plot, [
    { x: dates, y: sm(z_fraud), type: 'scatter', mode: 'lines', name: 'Realized fraud rate (z)', line: { color: COLORS.bad, width: 2.2 } },
    { x: dates, y: sm(z_score), type: 'scatter', mode: 'lines', name: 'Mean model score (z)', line: { color: COLORS.compositional, width: 2.2 } },
  ], baseLayout({
    yaxis: { title: 'z-score (vs pre-shift baseline)' },
    shapes: shiftShape(),
    height: 380,
  }), CFG);

  // Rolling correlation
  const window = 21;
  const corr = dates.map((_, i) => {
    if (i < window) return null;
    const a = z_fraud.slice(i - window, i), b = z_score.slice(i - window, i);
    const ma = a.reduce((x, y) => x + y, 0) / a.length, mb = b.reduce((x, y) => x + y, 0) / b.length;
    let num = 0, da = 0, db = 0;
    for (let k = 0; k < a.length; k++) { num += (a[k] - ma) * (b[k] - mb); da += (a[k] - ma) ** 2; db += (b[k] - mb) ** 2; }
    return num / Math.sqrt(da * db);
  });
  const c2 = chartCard('Rolling 21-day correlation between fraud rate and mean score',
    'Healthy: persistently >0.6. Falling toward zero or negative inside OOT means fraud is moving and score isn\'t — definitive concept drift.');
  m.appendChild(c2.wrap);
  Plotly.newPlot(c2.plot, [
    { x: dates, y: corr, type: 'scatter', mode: 'lines', line: { color: COLORS.accent, width: 2 }, name: 'corr(fraud, score)' },
  ], baseLayout({
    yaxis: { title: 'Pearson r', range: [-0.3, 1] },
    shapes: [
      ...shiftShape(),
      { type: 'line', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: 0.6, y1: 0.6, line: { color: '#cbd5e1', width: 1, dash: 'dash' } },
    ],
    height: 280,
  }), CFG);
};

}

    traces.push({
      x: Array.from({ length: 12 }, (_, w) => 'W' + (w + 1)),
      y: rawBins.map(b => b[k]),
      type: 'scatter', mode: 'lines+markers',
      name: `D${k+1} raw`, line: { color: palette[k], width: 1.4, dash: 'dot' },
      marker: { size: 4 }, legendgroup: 'raw', showlegend: k === 0,
      xaxis: 'x', yaxis: 'y',
    });
  }
  for (let k = 0; k < 10; k++) {
    traces.push({
      x: Array.from({ length: 12 }, (_, w) => 'W' + (w + 1)),
      y: isoBins.map(b => b[k]),
      type: 'scatter', mode: 'lines+markers',
      name: `D${k+1} iso`, line: { color: palette[k], width: 1.8 },
      marker: { size: 4 }, legendgroup: 'iso', showlegend: k === 0,
      xaxis: 'x2', yaxis: 'y2',
    });
  }
  Plotly.newPlot(c1.plot, traces, baseLayout({
    grid: { rows: 1, columns: 2, pattern: 'independent' },
    xaxis:  { title: 'Raw-score binning', anchor: 'y' },
    xaxis2: { title: 'Isotonic-then-bin', anchor: 'y2' },
    yaxis:  { title: 'Per-bin share', range: [0, 0.22], tickformat: '.0%' },
    yaxis2: { range: [0, 0.22], tickformat: '.0%', matches: 'y' },
    height: 380, showlegend: false,
  }), CFG);

  m.appendChild(makeCallout('Operational benefit', `
    Calibration-anchored bins survive normal model retraining because retraining shifts the raw-score scale but not the score-to-fraud-rate map. This means downstream policy
    (decline thresholds, queue routing, customer-facing risk tiers) does not need to be re-tuned every refresh. It also makes monitoring cleaner: drift in calibrated bins is a stronger signal of concept drift, because input-distribution drift has been substantially absorbed by the calibration step.
  `, 'good'));
};

/* -------------------- POST-DEPLOY MONITORING -------------------- */
ROUTES['monitoring'] = () => {
  const m = main();
  m.appendChild(pageHeader(
    'Post-deploy monitoring · concept vs input drift',
    `Two complementary metrics, different remediations. <strong>Bin volume drift</strong> (the score distribution is moving) suggests rebinning may suffice — input drift. <strong>Bin fraud-rate drift</strong> (the score-to-fraud-rate map is breaking) requires retraining — concept drift. Conflating them produces the wrong response.`
  ));

  const days = monitor.map(r => r.i);
  const c1 = chartCard('Daily input-drift and concept-drift indices',
    'Input drift (KL of bin volumes) starts moving first; concept drift (per-bin fraud-rate divergence) lags but eventually exceeds it. The gap between them is the early warning window.');
  m.appendChild(c1.wrap);
  Plotly.newPlot(c1.plot, [
    { x: days, y: monitor.map(r => r.inputDrift), type: 'scatter', mode: 'lines', name: 'Input drift (bin volume KL)', line: { color: COLORS.accent, width: 2 } },
    { x: days, y: monitor.map(r => r.conceptDrift), type: 'scatter', mode: 'lines', name: 'Concept drift (bin fraud-rate)', line: { color: COLORS.bad, width: 2 } },
  ], baseLayout({
    xaxis: { title: 'Days since deploy' },
    yaxis: { title: 'Drift index' },
    shapes: [
      { type: 'line', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: 0.10, y1: 0.10, line: { color: '#94a3b8', width: 1, dash: 'dash' } },
      { type: 'line', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: 0.20, y1: 0.20, line: { color: '#fb923c', width: 1, dash: 'dash' } },
    ],
    annotations: [
      { xref: 'paper', x: 0.99, y: 0.10, text: 'rebinning threshold', showarrow: false, font: { size: 9, color: '#94a3b8' }, xanchor: 'right' },
      { xref: 'paper', x: 0.99, y: 0.20, text: 'retrain threshold', showarrow: false, font: { size: 9, color: '#fb923c' }, xanchor: 'right' },
    ],
    height: 380,
  }), CFG);

  // Decision matrix
  const tblWrap = el('div', 'chart-wrap');
  tblWrap.innerHTML = `<div class="chart-head"><div class="chart-t">Drift response decision matrix</div></div>`;
  const tbl = el('table', 'rt-tbl');
  tbl.innerHTML = `
    <thead><tr><th></th><th>Concept low</th><th>Concept high</th></tr></thead>
    <tbody>
      <tr><td><strong>Input low</strong></td><td><span class="pill pill-good">healthy</span> · keep monitoring</td><td><span class="pill pill-bad">target relationship broken</span> · retrain on recent data, investigate why population is stable but signal moved</td></tr>
      <tr><td><strong>Input high</strong></td><td><span class="pill pill-warn">mix shift only</span> · rebinning sufficient if calibration holds; consider segment-conditional retraining</td><td><span class="pill pill-bad">full regime change</span> · retrain end-to-end; do not just rebin</td></tr>
    </tbody>`;
  tblWrap.appendChild(tbl);
  m.appendChild(tblWrap);

  m.appendChild(makeCallout('Tying it back', `
    The story across this hub: input drift (population shifted) and concept drift (relationship broke) <em>can</em> happen separately. The headline AUC dashboard collapses both into one number that hides which is happening. The decompositions on the previous pages —
    feature buckets, conditional PSI, decile drift, dual-signal correlation, cohort slice degradation, calibration-vs-AUC — are the diagnostic tools that let you tell the difference and respond appropriately. None of them are individually new; the discipline is in running all of them and reading them together.
  `, 'info'));
};

/* ============================================================================
   Helpers + boot
   ============================================================================ */
function makeCallout(title, body, kind) {
  const c = el('div', 'alert ' + (kind || 'info'));
  c.innerHTML = `<div><strong>${title}.</strong> ${body}</div>`;
  return c;
}
function main() { return document.getElementById('main'); }
function navEl() { return document.getElementById('nav'); }
function crumbsEl() { return document.getElementById('crumbs'); }
function topEl() { return document.getElementById('topstats'); }

const collapsedSections = new Set();
let currentPath = 'overview';

function navigate(path) {
  // purge any plotly elements
  main().querySelectorAll('div').forEach(d => { try { Plotly.purge(d); } catch (e) {} });
  currentPath = path;
  location.hash = '#/' + path;
  renderCrumbs();
  updateActive();
  render();
}

function render() {
  main().innerHTML = '';
  const fn = ROUTES[currentPath] || ROUTES['overview'];
  fn();
}

function renderNav() {
  navEl().innerHTML = '';
  NAV.forEach(sec => {
    if (sec.kind === 'direct') {
      const e = el('div', 'nav-direct');
      e.dataset.path = sec.id;
      e.innerHTML = `<span>${sec.title}</span>${sec.badge ? `<span class="badge ${sec.badgeKind ? 'badge-' + sec.badgeKind : ''}">${sec.badge}</span>` : ''}`;
      e.onclick = () => navigate(sec.id);
      navEl().appendChild(e);
    } else {
      const sectionEl = el('div', 'nav-section');
      if (collapsedSections.has(sec.id)) sectionEl.classList.add('collapsed');
      const head = el('div', 'nav-head');
      head.innerHTML = `<span>${sec.title}</span>${sec.badge ? `<span class="badge badge-${sec.badgeKind || ''}">${sec.badge}</span>` : ''}<span class="chev">▼</span>`;
      head.onclick = () => {
        if (collapsedSections.has(sec.id)) collapsedSections.delete(sec.id);
        else collapsedSections.add(sec.id);
        sectionEl.classList.toggle('collapsed');
      };
      sectionEl.appendChild(head);
      const items = el('div', 'nav-items');
      (sec.children || []).forEach(sub => {
        const item = el('div', 'nav-item');
        const path = `${sec.id}/${sub.id}`;
        item.dataset.path = path;
        item.innerHTML = `<span>${sub.title}</span>${sub.badge ? `<span class="badge">${sub.badge}</span>` : ''}`;
        item.onclick = () => navigate(path);
        items.appendChild(item);
      });
      sectionEl.appendChild(items);
      navEl().appendChild(sectionEl);
    }
  });
  updateActive();
}

function updateActive() {
  document.querySelectorAll('.nav-item, .nav-direct').forEach(e => {
    e.classList.toggle('active', e.dataset.path === currentPath);
  });
}

function renderCrumbs() {
  const parts = currentPath.split('/');
  let crumbs = ['<strong>Stability & Calibration</strong>'];
  if (parts[0]) {
    const sec = NAV.find(s => s.id === parts[0]);
    crumbs.push('<span class="sep">›</span>');
    crumbs.push(parts[1] ? `<span>${sec?.title || parts[0]}</span>` : `<strong>${sec?.title || parts[0]}</strong>`);
    if (parts[1]) {
      const sub = sec?.children?.find(c => c.id === parts[1]);
      crumbs.push('<span class="sep">›</span>');
      crumbs.push(`<strong>${sub?.title || parts[1]}</strong>`);
    }
  }
  crumbsEl().innerHTML = crumbs.join(' ');
}

function renderTopstats() {
  const meanAUC = daily.slice(-30).reduce((a, b) => a + b.auc, 0) / 30;
  const meanECE = daily.slice(-30).reduce((a, b) => a + b.ece, 0) / 30;
  topEl().innerHTML = `
    <div class="tstat"><span>OOT</span><strong>AUC ${meanAUC.toFixed(3)}</strong></div>
    <span class="tstat-sep">·</span>
    <div class="tstat"><span>ECE</span><strong>${meanECE.toFixed(3)}</strong></div>
    <span class="tstat-sep">·</span>
    <div class="tstat"><span>ADV-AUC</span><strong>${ADV_AUC.toFixed(3)}</strong></div>
    <span class="tstat-sep">·</span>
    <div class="tstat"><span>maturity</span><strong>${idx95}d</strong></div>
  `;
}

// boot
window.addEventListener('hashchange', () => {
  const p = location.hash.replace(/^#\/?/, '') || 'overview';
  if (p !== currentPath) { currentPath = p; renderCrumbs(); updateActive(); render(); }
});
renderNav();
renderTopstats();
const initial = location.hash.replace(/^#\/?/, '') || 'overview';
currentPath = initial;
renderCrumbs();
updateActive();
render();
</script>
</body>
</html>
