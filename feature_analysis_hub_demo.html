<style>
  :root {
    --sb-bg: #0f172a;
    --sb-bg-2: #1e293b;
    --sb-fg: #cbd5e1;
    --sb-dim: #64748b;
    --accent: #6366f1;
    --accent-bg: rgba(99,102,241,0.16);
    --bg: #f6f7fb;
    --card: #ffffff;
    --border: #e4e7ec;
    --text: #0f172a;
    --dim: #64748b;
    --good: #10b981;
    --warn: #f59e0b;
    --bad: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    font-size: 14px;
    display: flex;
    overflow: hidden;
  }

  /* ================= SIDEBAR ================= */
  .sidebar {
    width: 280px;
    background: var(--sb-bg);
    color: var(--sb-fg);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sb-head {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--sb-bg-2);
  }
  .sb-title { font-size: 15px; font-weight: 700; color: #f1f5f9; margin: 0; display: flex; align-items: center; gap: 8px; }
  .sb-title::before { content: ''; width: 8px; height: 8px; border-radius: 2px; background: var(--accent); display: inline-block; }
  .sb-sub { font-size: 11px; color: var(--sb-dim); margin-top: 4px; letter-spacing: 0.4px; text-transform: uppercase; font-variant-numeric: tabular-nums; }
  .sb-hublink {
    display: block; font-size: 11px; color: var(--sb-dim);
    padding: 8px 20px; text-decoration: none;
    border-bottom: 1px solid var(--sb-bg-2);
  }
  .sb-hublink:hover { color: var(--accent); }
  .sb-hublink .arrow { float: right; }
  .sb-search { padding: 10px 14px; border-bottom: 1px solid var(--sb-bg-2); }
  .sb-search input {
    width: 100%; background: var(--sb-bg-2); border: 1px solid #334155;
    color: #f1f5f9; padding: 7px 10px; border-radius: 5px; font-size: 12px; outline: none;
  }
  .sb-search input:focus { border-color: var(--accent); }
  .sb-search input::placeholder { color: var(--sb-dim); }

  .nav { flex: 1; overflow-y: auto; padding: 6px 0 10px; }
  .nav::-webkit-scrollbar { width: 6px; }
  .nav::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

  .nav-section { margin-bottom: 1px; }
  .nav-head {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px 9px 18px; cursor: pointer; user-select: none;
    font-size: 12.5px; font-weight: 600; color: #e2e8f0;
    letter-spacing: 0.2px;
  }
  .nav-head:hover { background: rgba(255,255,255,0.04); }
  .nav-head .chev {
    margin-left: auto; color: var(--sb-dim); font-size: 9px;
    transition: transform 0.15s; transform-origin: center;
  }
  .nav-section.collapsed .chev { transform: rotate(-90deg); }
  .nav-section.collapsed .nav-items { display: none; }
  .nav-items { padding: 2px 0 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 18px 6px 42px; cursor: pointer;
    font-size: 12.5px; color: var(--sb-fg);
    border-left: 2px solid transparent;
    text-decoration: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: #f1f5f9; }
  .nav-item.active {
    color: #f1f5f9; background: var(--accent-bg);
    border-left-color: var(--accent); font-weight: 500;
  }
  .nav-direct {
    padding: 9px 18px; cursor: pointer;
    font-size: 12.5px; color: #e2e8f0; font-weight: 600;
    border-left: 2px solid transparent;
    display: flex; gap: 10px; align-items: center;
  }
  .nav-direct:hover { background: rgba(255,255,255,0.04); }
  .nav-direct.active { background: var(--accent-bg); border-left-color: var(--accent); }
  .nav-hide { display: none !important; }

  .badge {
    font-size: 10px; padding: 1px 7px; border-radius: 10px;
    background: #334155; color: #cbd5e1; margin-left: auto;
    font-weight: 500; letter-spacing: 0.2px;
  }
  .badge-warn { background: #78350f; color: #fcd34d; }
  .badge-bad { background: #7f1d1d; color: #fca5a5; }

  .sb-foot {
    padding: 12px 18px; border-top: 1px solid var(--sb-bg-2);
    font-size: 11px; color: var(--sb-dim);
  }

  /* ================= CONTENT ================= */
  .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 56px; background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;

<script>
/* =========================================================================
   SEEDED RNG + HELPERS
   ========================================================================= */
function mulberry32(s) { return function() {
  s = (s + 0x6D2B79F5) | 0;
  let t = Math.imul(s ^ (s >>> 15), 1 | s);
  t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
};}
const rng = mulberry32(7);
function randn() {
  const u1 = Math.max(rng(), 1e-10), u2 = rng();
  return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
}
const clip = (x, lo, hi) => Math.max(lo, Math.min(hi, x));
const sig = x => 1 / (1 + Math.exp(-x));

/* =========================================================================
   TIME GRID + FEATURES
   ========================================================================= */
const N_DAYS = window.DATA.n_days;
const OOT_DAY = window.DATA.oot_day;
const START = new Date(window.DATA.start_date + 'T00:00:00Z');
const DATES = Array.from({length: N_DAYS}, (_, i) =>
  new Date(START.getTime() + i * 86400000).toISOString().slice(0, 10));
const N_WEEKS = Math.ceil(N_DAYS / 7);
const OOT_WEEK = Math.floor(OOT_DAY / 7);
const WEEKS = Array.from({length: N_WEEKS}, (_, i) => `W${String(i+1).padStart(2,'0')}`);

// Feature list: comes from window.DATA.features
const FEATURES = window.DATA.features.length ? window.DATA.features : [
  { n: 'amt_log',            t: 'num', imp: 0.185, auc: 0.78, drift: 0.02, miss: 0.01 },
  { n: 'velocity_24h',       t: 'num', imp: 0.152, auc: 0.76, drift: 0.03, miss: 0.00 },

  { n: 'merchant_risk',      t: 'num', imp: 0.065, auc: 0.68, drift: 0.06, miss: 0.02 },
  { n: 'card_tenure',        t: 'num', imp: 0.054, auc: 0.66, drift: 0.03, miss: 0.01 },
  { n: 'num_declines_7d',    t: 'num', imp: 0.048, auc: 0.65, drift: 0.04, miss: 0.00 },
  { n: 'avg_ticket_90d',     t: 'num', imp: 0.040, auc: 0.63, drift: 0.04, miss: 0.03 },
  { n: 'session_entropy',    t: 'num', imp: 0.031, auc: 0.61, drift: 0.05, miss: 0.04 },
  { n: 'address_change_30d', t: 'num', imp: 0.022, auc: 0.59, drift: 0.19, miss: 0.01 },  // DRIFT
  { n: 'ua_rarity',          t: 'num', imp: 0.018, auc: 0.58, drift: 0.10, miss: 0.24 },  // MISSING
  { n: 'phone_carrier_risk', t: 'num', imp: 0.015, auc: 0.57, drift: 0.05, miss: 0.08 },
  { n: 'bin_country',        t: 'cat', imp: 0.042, auc: 0.64, drift: 0.09, miss: 0.01,

  { n: 'channel',            t: 'cat', imp: 0.028, auc: 0.60, drift: 0.04, miss: 0.00,

  { n: 'merchant_category',  t: 'cat', imp: 0.035, auc: 0.62, drift: 0.05, miss: 0.00,
    cats: ['retail','digital','travel','food','services','gaming','crypto','OTHER'] },
  { n: '3ds_outcome',        t: 'cat', imp: 0.025, auc: 0.60, drift: 0.07, miss: 0.17,
    cats: ['pass','fail','frictionless','challenge','bypass'] },
];
const FMAP = Object.fromEntries(FEATURES.map(f => [f.n, f]));
const NUM_FEATURES = FEATURES.filter(f => f.t === 'num').map(f => f.n);
const CAT_FEATURES = FEATURES.filter(f => f.t === 'cat').map(f => f.n);
const FEATURES_SORTED = [...FEATURES].sort((a, b) => b.imp - a.imp);

// Sticky feature state — last feature the user picked in any per-feature view
let lastSelectedFeature = FEATURES_SORTED[0].n;
function setLastFeature(name) { if (FMAP[name]) lastSelectedFeature = name; }
function resolveFeature(params, filter = () => true) {
  if (params.f && FMAP[params.f] && filter(FMAP[params.f])) return params.f;
  if (FMAP[lastSelectedFeature] && filter(FMAP[lastSelectedFeature])) return lastSelectedFeature;
  return FEATURES.filter(filter)[0].n;
}

// Tiny SVG sparkline for the sidebar
function sparklineSVG(values, opts = {}) {
  const w = opts.width || 48, h = opts.height || 14;
  const min = opts.min != null ? opts.min : Math.min(...values);
  const max = opts.max != null ? opts.max : Math.max(...values);
  const range = Math.max(max - min, 1e-6);
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * (w - 2) + 1;
    const y = h - 1 - ((v - min) / range) * (h - 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class="nav-spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${opts.color || '#94a3b8'}" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>`;
}

function featureHealth(f) {
  if (f.drift > 0.1) return 'bad';
  if (f.miss > 0.15) return 'warn';

}

FEATURES.forEach(f => {
  // Weekly AUC + missing
  const wa = [], wm = [], wp = [];
  for (let w = 0; w < N_WEEKS; w++) {
    const postOOT = w >= OOT_WEEK ? 1 : 0;
    const aucDrift = postOOT * f.drift * (1 + (w - OOT_WEEK) * 0.12) + randn() * 0.012;
    wa.push(clip(f.auc - aucDrift, 0.45, 0.92));
    const missShift = postOOT * 0.022 + randn() * 0.02;
    wm.push(clip(f.miss + missShift, 0, 1));
    // permutation ~= (AUC - 0.5) scaled by importance, with weekly noise
    const permDrop = f.imp * 0.8 * clip(f.auc - 0.5, 0, 1) + randn() * 0.003 - postOOT * f.drift * 0.2;
    wp.push(clip(permDrop, 0, 0.06));
  }
  weeklyAUC[f.n] = wa; weeklyMiss[f.n] = wm; weeklyPerm[f.n] = wp;

  // Daily AUC + missing + permutation
  const da = [], dm = [], dp = [];
  for (let d = 0; d < N_DAYS; d++) {
    const postOOT = d >= OOT_DAY ? 1 : 0;
    const aucDrift = postOOT * f.drift * (1 + (d - OOT_DAY) / 50) + randn() * 0.025;
    da.push(clip(f.auc - aucDrift, 0.45, 0.93));
    const missShift = postOOT * 0.03 + randn() * 0.028;
    dm.push(clip(f.miss + missShift, 0, 1));
    const permDrop = f.imp * 0.8 * clip(f.auc - 0.5, 0, 1) + randn() * 0.005 - postOOT * f.drift * 0.25;
    dp.push(clip(permDrop, 0, 0.07));
  }
  dailyAUC[f.n] = da; dailyMiss[f.n] = dm; dailyPerm[f.n] = dp;

  // Anomalies: robust z of daily median (amplified for drifty features)
  const zs = [], ms = [];
  for (let d = 0; d < N_DAYS; d++) {
    const postOOT = d >= OOT_DAY ? 1 : 0;
    const baseZ = randn() * 0.9 + postOOT * f.drift * 14;
    const spike = (Math.abs(randn()) > 2.2 && d > 40) ? (randn() > 0 ? 4 : -3.5) * f.drift * 8 : 0;
    zs.push(baseZ + spike);
    ms.push(randn() * 0.8 + postOOT * f.drift * 10 + (d > 60 && d < 80 ? Math.sin((d-60)/5) * 2 : 0));
  }
  anomZ[f.n] = zs; anomMean[f.n] = ms;

  // Spreads per numeric feature
  if (f.t === 'num') {
    const q1 = [], q3 = [], mean = [], vmin = [], vmax = [];
    for (let d = 0; d < N_DAYS; d++) {
      const postOOT = d >= OOT_DAY ? 1 : 0;
      const shift = postOOT * f.drift * 3;
      const m = 50 + shift + randn() * 2 + Math.sin(d / 12) * 3;
      const spread = 15 + postOOT * f.drift * 8;
      mean.push(m);
      q1.push(m - spread * 0.7);
      q3.push(m + spread * 0.7);
      vmin.push(m - spread * 2.2 - Math.abs(randn()) * 2);
      vmax.push(m + spread * 2.2 + Math.abs(randn()) * 2);
    }
    spreads[f.n] = { q1, q3, mean, min: vmin, max: vmax };
  }

  // Behavior: 10 buckets, count + fraud_rate + mean_score (numeric)
  if (f.t === 'num') {
    const buckets = Array.from({length: 10}, (_, i) => `Q${i+1}`);
    const count = [], fraudRate = [], meanScore = [];
    for (let i = 0; i < 10; i++) {
      count.push(Math.round(800 + rng() * 600));
      // Monotonic relationship + noise, based on feature's AUC strength
      const strength = (f.auc - 0.5) * 2;
      const fr = sig(-3 + strength * (i / 9) * 4 + randn() * 0.3);
      fraudRate.push(fr);
      meanScore.push(clip(fr * 0.7 + 0.05 + randn() * 0.03, 0.01, 0.99));
    }
    behavior[f.n] = { buckets, count, fraudRate, meanScore };
  } else {
    // Behavior for categorical
    const cts = f.cats;
    const count = cts.map((_, i) => Math.round(500 + rng() * 1200 * (1 / (i + 1))));
    const fraudRate = cts.map(c => {
      let base = 0.01;
      if (c === 'NG' || c === 'crypto' || c === 'gaming' || c === 'fail') base = 0.08 + rng() * 0.04;
      else if (c === 'bypass' || c === 'api') base = 0.04 + rng() * 0.02;
      return base + randn() * 0.005;
    });
    const meanScore = fraudRate.map(fr => clip(fr * 0.8 + 0.04 + randn() * 0.02, 0.01, 0.99));
    behavior[f.n] = { buckets: cts, count, fraudRate, meanScore };
  }

  // PDP (numeric only)
  if (f.t === 'num') {
    const n = 25;
    const xs = Array.from({length: n}, (_, i) => i / (n - 1));
    const strength = (f.auc - 0.5) * 2;
    const ys = xs.map(x => sig(-2.5 + strength * x * 4 + Math.sin(x * 6) * 0.3 * strength));
    pdp[f.n] = { xs, ys, baseline: ys.reduce((a, b) => a + b, 0) / ys.length };
  }

  // Categorical daily shares (for cat features)
  if (f.t === 'cat') {
    const cats = f.cats;
    const shares = cats.map(() => []);
    for (let d = 0; d < N_DAYS; d++) {
      const postOOT = d >= OOT_DAY ? 1 : 0;
      const raw = cats.map((_, i) => {
        const base = Math.exp(-i * 0.5);
        const shift = (i === cats.length - 1 ? postOOT * f.drift * 4 : 0)  // last cat grows in OOT
                    + (i === 0 ? -postOOT * f.drift * 2 : 0);
        return Math.max(0.01, base + shift + randn() * 0.08);
      });
      const s = raw.reduce((a, b) => a + b, 0);
      raw.forEach((v, i) => shares[i].push(v / s));
    }
    catShares[f.n] = shares;
  }
});

// Bivariate: generate 5x5 fraud-rate heatmap for any selected pair
function bivariateFR(f1, f2) {
  // Deterministic hash seed from names for stability
  let seed = 0; for (const c of (f1 + '|' + f2)) seed = (seed * 31 + c.charCodeAt(0)) | 0;
  const r = mulberry32(Math.abs(seed) || 1);
  const rn = () => { const u1 = Math.max(r(), 1e-10), u2 = r(); return Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2); };
  const alpha = -3.2 + rn() * 0.3;
  const b1 = 1.4 + rn() * 0.4, b2 = 1.1 + rn() * 0.4, binter = 0.6 * rn();
  const z = [], cnt = [];
  for (let i = 0; i < 5; i++) {
    const rowZ = [], rowC = [];
    for (let j = 0; j < 5; j++) {
      const x1 = i / 4, x2 = j / 4;
      const p = sig(alpha + b1 * x1 + b2 * x2 + binter * x1 * x2 + rn() * 0.2);
      rowZ.push(p);
      rowC.push(Math.round(200 + r() * 800));
    }
    z.push(rowZ); cnt.push(rowC);
  }
  return { z, cnt };
}

// Clustering data
function buildClusterData() {
  const ks = [2, 3, 4, 5, 6, 7, 8, 9, 10];
  const silhouette = {
    train: ks.map(k => 0.55 - Math.abs(k - 4) * 0.04 + randn() * 0.015),
    val:   ks.map(k => 0.52 - Math.abs(k - 4) * 0.045 + randn() * 0.02),
    oot:   ks.map(k => 0.41 - Math.abs(k - 4) * 0.05 + randn() * 0.025),
  };
  // PCA scatter: 4 methods, 400 points each
  const nPoints = 400;
  const methods = ['KMeans', 'Ward', 'GMM', 'DBSCAN'];
  const scatters = {};
  methods.forEach(m => {
    const x = [], y = [], lbl = [];
    const nc = m === 'DBSCAN' ? 5 : 4;
    for (let i = 0; i < nPoints; i++) {
      let c;
      if (m === 'DBSCAN' && rng() < 0.08) c = -1;
      else c = Math.floor(rng() * nc);
      const cx = c === -1 ? 0 : Math.cos(c * 2 * Math.PI / nc) * 2.3;
      const cy = c === -1 ? 0 : Math.sin(c * 2 * Math.PI / nc) * 2.3;
      x.push(cx + randn() * 0.7);
      y.push(cy + randn() * 0.7);
      lbl.push(c);
    }
    scatters[m] = { x, y, lbl };
  });
  // Cluster profile: 4 clusters × top 10 features
  const topFeats = FEATURES.slice(0, 10).map(f => f.n);
  const profile = [];
  for (let c = 0; c < 4; c++) {
    const row = topFeats.map(() => randn() * 1.3);
    profile.push(row);
  }
  // Weekly cluster mix (last OOT weeks)
  const ootWeeks = Array.from({length: N_WEEKS - OOT_WEEK}, (_, i) => `W${String(OOT_WEEK + i + 1).padStart(2,'0')}`);
  const mixRaw = Array.from({length: 4}, () => []);
  for (let w = 0; w < ootWeeks.length; w++) {
    const vals = [2 + randn() * 0.4, 1.5 + w * 0.1 + randn() * 0.3, 1 + randn() * 0.3, 1.2 - w * 0.05 + randn() * 0.3];
    const s = vals.reduce((a, b) => a + Math.max(0.05, b), 0);
    vals.forEach((v, i) => mixRaw[i].push(Math.max(0.05, v) / s));
  }
  // L1 drift week-to-week
  const drift = [];
  for (let w = 1; w < ootWeeks.length; w++) {
    let d = 0;
    for (let c = 0; c < 4; c++) d += Math.abs(mixRaw[c][w] - mixRaw[c][w-1]);
    drift.push(d);
  }
  return { ks, silhouette, scatters, profile, topFeats, ootWeeks, mix: mixRaw, drift };
}
const CLUSTERS = buildClusterData();

function renderNav(filter = '') {
  navEl.innerHTML = '';
  const q = filter.trim().toLowerCase();
  NAV.forEach(sec => {
    if (sec.kind === 'direct') {
      if (q && !sec.title.toLowerCase().includes(q)) return;
      const el = document.createElement('div');
      el.className = 'nav-direct';
      el.dataset.path = sec.id;
      el.innerHTML = `<span>${sec.title}</span>${sec.badge ? `<span class="badge ${sec.badgeKind ? 'badge-' + sec.badgeKind : ''}">${sec.badge}</span>` : ''}`;
      el.onclick = () => navigate(sec.id);
      navEl.appendChild(el);
    } else {
      const sectionEl = document.createElement('div');
      sectionEl.className = 'nav-section';
      if (collapsedSections.has(sec.id)) sectionEl.classList.add('collapsed');
      const head = document.createElement('div');
      head.className = 'nav-head';
      head.innerHTML = `<span>${sec.title}</span>${sec.badge ? `<span class="badge ${sec.badgeKind ? 'badge-' + sec.badgeKind : ''}">${sec.badge}</span>` : ''}<span class="chev">▼</span>`;
      head.onclick = () => {
        if (collapsedSections.has(sec.id)) collapsedSections.delete(sec.id);
        else collapsedSections.add(sec.id);
        sectionEl.classList.toggle('collapsed');
      };
      sectionEl.appendChild(head);
      const items = document.createElement('div');
      items.className = sec.childrenKind === 'feat' ? 'nav-items nav-items-feat' : 'nav-items';
      let hasMatch = false;
      sec.children.forEach(sub => {
        if (q && !sub.title.toLowerCase().includes(q) && !sec.title.toLowerCase().includes(q)) return;
        hasMatch = true;
        const item = document.createElement('div');
        item.className = 'nav-item';
        const path = sub.path || `${sec.id}/${sub.id}`;
        item.dataset.path = path;
        if (sub.sparklineFor) {
          const spark = sparklineSVG(weeklyAUC[sub.sparklineFor], {
            width: 42, height: 12, min: 0.45, max: 0.85,
            color: sub.dot === 'bad' ? '#ef4444' : sub.dot === 'warn' ? '#f59e0b' : '#94a3b8'
          });
          item.innerHTML = `<span>${sub.title}</span>${spark}<span class="nav-dot ${sub.dot || ''}"></span>`;
        } else {
          item.innerHTML = `<span>${sub.title}</span>${sub.badge ? `<span class="badge ${sub.badgeKind ? 'badge-' + sub.badgeKind : ''}">${sub.badge}</span>` : ''}`;
        }
        item.onclick = () => navigate(path);
        items.appendChild(item);
      });
      sectionEl.appendChild(items);
      if (q && !hasMatch && !sec.title.toLowerCase().includes(q)) return;
      if (q) sectionEl.classList.remove('collapsed');  // auto-expand on search
      navEl.appendChild(sectionEl);
    }
  });
  updateActive();
}

}

function renderCrumbs() {
  const parts = currentPath.split('/');

    crumbs.push(`<span class="sep">›</span>`);

let currentPath = '';

function navigate(path, params = {}) {
  // Clean up any existing Plotly charts
  mainEl.querySelectorAll('[id^="plot-"], [id^="ff-plot-"]').forEach(el => { try { Plotly.purge(el); } catch (e) {} });
  currentPath = path;
  const qs = new URLSearchParams(params).toString();
  location.hash = '#/' + path + (qs ? '?' + qs : '');
  renderCrumbs();
  updateActive();
  render(params);
}

window.addEventListener('hashchange', () => {
  const h = location.hash.replace(/^#\/?/, '');
  const [p, qs] = h.split('?');
  const params = Object.fromEntries(new URLSearchParams(qs || ''));
  if (p !== currentPath) {
    currentPath = p || 'overview';
    renderCrumbs(); updateActive(); render(params);
  }
});

function render(params = {}) {
  const parts = currentPath.split('/');
  // Feature focus page: feature/<name>
  if (parts[0] === 'feature' && parts[1]) {
    mainEl.innerHTML = '';
    renderFeatureFocus(parts[1], params);
    return;
  }
  const fn = ROUTES[currentPath] || ROUTES[parts[0]] || ROUTES['overview'];
  mainEl.innerHTML = '';
  fn(params);
}

    type: 'bar',
    x: sortedIdx.map(i => FEATURES[i].n),
    y: sortedIdx.map(i => deltas[i]),

  }), COMMON_CFG);

    navigate(`feature/${name}`);
  });
};

// ------- FEATURE PICKER (reusable) -------
function featurePicker(currentName, featList, onChange) {
  const bar = el('div', 'controls');
  const idx = featList.indexOf(currentName);
  bar.innerHTML = `
    <div class="ctl">
      <label>Feature</label>
      <select id="fp-sel">${featList.map(f => `<option value="${f}" ${f===currentName?'selected':''}>${f}</option>`).join('')}</select>
    </div>
    <div class="ctl">
      <button id="fp-prev" ${idx<=0?'disabled':''}>← Prev</button>
      <button id="fp-next" ${idx>=featList.length-1?'disabled':''}>Next →</button>
    </div>
    <div class="ctl" style="font-size:12px;color:var(--dim);">
      <span>Feature ${idx+1} of ${featList.length}</span>
    </div>
    <a class="ff-jump-link" id="fp-focus">Open full feature page →</a>
  `;
  bar.querySelector('#fp-sel').onchange = e => onChange(e.target.value);
  bar.querySelector('#fp-prev').onclick = () => { if (idx > 0) onChange(featList[idx-1]); };
  bar.querySelector('#fp-next').onclick = () => { if (idx < featList.length-1) onChange(featList[idx+1]); };
  bar.querySelector('#fp-focus').onclick = () => navigate(`feature/${currentName}`);
  return bar;
}

    colorbar: { title: { text: 'mean Z', font: {size:11} }, thickness: 12 },

  }], baseLayout({
    xaxis: { tickangle: -30, showgrid: false },
    yaxis: { showgrid: false, autorange: 'reversed' },
    margin: { t: 14, r: 60, b: 90, l: 60 }
  }), COMMON_CFG);

  const row = el('div', 'row2');
  const c2 = chartCard('OOT weekly cluster mix', 'Stacked share, C0–C3', 'plot-mix', 320);
  row.appendChild(c2.wrap);
  const palette = ['#6366f1', '#10b981', '#f59e0b', '#ef4444'];
  const mixTraces = [0,1,2,3].map(c => ({
    type: 'scatter', mode: 'lines', x: CLUSTERS.ootWeeks, y: CLUSTERS.mix[c],
    stackgroup: 'mix', name: `C${c}`,
    line: { width: 0.5, color: palette[c] }, fillcolor: palette[c],
    hovertemplate: `C${c}: %{y:.1%}<extra></extra>`
  }));
  Plotly.newPlot(c2.plot, mixTraces, baseLayout({
    xaxis: { tickangle: -30, showgrid: false },
    yaxis: { title: 'share', range: [0, 1], tickformat: '.0%' },
    legend: { orientation: 'h', y: -0.2, x: 0.5, xanchor: 'center' },
    margin: { t: 14, r: 20, b: 60, l: 50 }
  }), COMMON_CFG);

  const c3 = chartCard('Week-to-week mix drift', 'Σ |Δ share|  (L1 norm)', 'plot-drift', 320);
  row.appendChild(c3.wrap);
  Plotly.newPlot(c3.plot, [{
    type: 'scatter', mode: 'lines+markers', x: CLUSTERS.ootWeeks.slice(1), y: CLUSTERS.drift,
    line: { color: '#ef4444', width: 2.5 }, marker: { size: 8 },
    hovertemplate: 'week → %{x}<br>L1 drift: %{y:.3f}<extra></extra>', name: 'L1 drift'
  }], baseLayout({
    xaxis: { title: 'week (to)', tickangle: -30, showgrid: false },
    yaxis: { title: 'Σ |Δ share|', gridcolor: '#f1f5f9', rangemode: 'tozero' },
    margin: { t: 14, r: 20, b: 60, l: 60 }, showlegend: false
  }), COMMON_CFG);

  mainEl.appendChild(row);
};

/* =========================================================================
   FEATURE FOCUS PAGE — unified per-feature view
   ========================================================================= */
function renderFeatureFocus(featName, params) {
  if (!FMAP[featName]) { navigate('overview'); return; }
  setLastFeature(featName);
  const vsRaw = (params.vs || '').split(',').map(s => s.trim()).filter(Boolean);
  const seen = new Set([featName]);
  const vsList = [];
  for (const v of vsRaw) {
    if (FMAP[v] && !seen.has(v)) { vsList.push(v); seen.add(v); }
    if (vsList.length >= 4) break;  // anchor + up to 4 = 5 total
  }
  if (vsList.length) renderFeatureCompare([featName, ...vsList]);
  else               renderFeatureSingle(featName);
}

const COMPARE_COLORS = ['#6366f1', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'];
const COMPARE_TAGS = ['A', 'B', 'C', 'D', 'E'];
const MAX_COMPARE = 5;

function compareMeta(features) {
  return features.map((name, i) => ({
    name, feat: FMAP[name],
    color: COMPARE_COLORS[i], tag: COMPARE_TAGS[i],
    tagClass: `ff-side-${COMPARE_TAGS[i].toLowerCase()}`,
  }));
}

function compareControlBar(features) {
  // features[0] is the anchor. features[1..] are comparison features.
  const bar = el('div', 'ff-compare-bar');
  const anchor = features[0];
  const comparisons = features.slice(1);

  if (comparisons.length === 0) {
    // Single-feature mode — "add a comparison" UI
    const options = FEATURES.filter(f => f.n !== anchor)
      .sort((a, b) => b.imp - a.imp)
      .map(f => `<option value="${f.n}">${f.n}</option>`).join('');
    bar.innerHTML = `
      <label>Compare</label>
      <span style="font-size:12px;color:var(--dim);">Side-by-side with another feature:</span>
      <select id="cmp-sel"><option value="">(pick a feature…)</option>${options}</select>
      <button id="cmp-go" class="btn-primary" disabled>Compare →</button>
    `;
    const sel = bar.querySelector('#cmp-sel');
    const go = bar.querySelector('#cmp-go');
    sel.onchange = () => { go.disabled = !sel.value; };
    go.onclick = () => { if (sel.value) navigate(`feature/${anchor}`, { vs: sel.value }); };
    return bar;
  }

  // Multi-compare mode — chips
  const label = el('span');
  label.innerHTML = `<label style="margin-right:4px">Compare</label>`;
  bar.appendChild(label);

  // Anchor chip — static
  const anchorChip = el('span', 'cmp-chip chip-anchor');
  anchorChip.innerHTML = `<span class="ff-side-tag ff-side-a">A</span><span class="chip-name-static">${anchor}</span>`;
  bar.appendChild(anchorChip);

  // Comparison chips — each has a dropdown to change, and an × to remove
  comparisons.forEach((featB, slotIdx) => {
    const meta = compareMeta(features)[slotIdx + 1];
    const chip = el('span', 'cmp-chip');
    const options = FEATURES
      .filter(ff => ff.n !== anchor && (ff.n === featB || !features.includes(ff.n)))
      .sort((a, b) => b.imp - a.imp)
      .map(ff => `<option value="${ff.n}" ${ff.n === featB ? 'selected' : ''}>${ff.n}</option>`).join('');
    chip.innerHTML = `
      <span class="ff-side-tag ${meta.tagClass}">${meta.tag}</span>
      <select data-slot="${slotIdx}">${options}</select>
      <button class="chip-remove" data-slot="${slotIdx}" title="Remove">×</button>
    `;
    bar.appendChild(chip);
  });

  // Add-feature dropdown (if under the cap)
  if (features.length < MAX_COMPARE) {
    const avail = FEATURES
      .filter(f => !features.includes(f.n))
      .sort((a, b) => b.imp - a.imp);
    const addChip = el('span', 'cmp-chip');
    addChip.style.background = 'white';
    addChip.style.borderStyle = 'dashed';
    addChip.innerHTML = `
      <select id="cmp-add"><option value="">+ Add feature…</option>${avail.map(f => `<option value="${f.n}">${f.n}</option>`).join('')}</select>
    `;
    bar.appendChild(addChip);
  } else {
    const note = el('span');
    note.style.fontSize = '11px';
    note.style.color = 'var(--dim)';
    note.textContent = `(max ${MAX_COMPARE} features)`;
    bar.appendChild(note);
  }

  // Exit button — pinned to the right
  const spacer = el('span'); spacer.style.marginLeft = 'auto';
  bar.appendChild(spacer);
  const exitBtn = el('button', 'btn-danger'); exitBtn.textContent = '× Exit compare';
  bar.appendChild(exitBtn);

  // Wire up handlers
  bar.querySelectorAll('.cmp-chip select[data-slot]').forEach(sel => {
    sel.onchange = e => {
      const slot = parseInt(e.target.dataset.slot);
      const newVs = [...comparisons];
      newVs[slot] = e.target.value;
      navigate(`feature/${anchor}`, { vs: newVs.join(',') });
    };
  });
  bar.querySelectorAll('.chip-remove').forEach(btn => {
    btn.onclick = e => {
      const slot = parseInt(e.currentTarget.dataset.slot);
      const newVs = comparisons.filter((_, i) => i !== slot);
      if (newVs.length === 0) navigate(`feature/${anchor}`);
      else navigate(`feature/${anchor}`, { vs: newVs.join(',') });
    };
  });
  const addSel = bar.querySelector('#cmp-add');
  if (addSel) {
    addSel.onchange = e => {
      if (!e.target.value) return;
      const newVs = [...comparisons, e.target.value];
      navigate(`feature/${anchor}`, { vs: newVs.join(',') });
    };
  }
  exitBtn.onclick = () => navigate(`feature/${anchor}`);
  return bar;
}

function renderFeatureSingle(featName) {
  const f = FMAP[featName];

  // Prev/Next ordering by importance
  const order = FEATURES_SORTED.map(x => x.n);
  const idx = order.indexOf(featName);
  const prevF = idx > 0 ? order[idx - 1] : null;
  const nextF = idx < order.length - 1 ? order[idx + 1] : null;

  // ---------- Hero header ----------
  const hero = el('div', 'ff-hero');
  const health = featureHealth(f);
  const statusPill = health === 'bad' ? '<span class="pill pill-bad">drift flag</span>'
                  : health === 'warn' ? '<span class="pill pill-warn">elevated missing</span>'
                  : '<span class="pill pill-good">healthy</span>';
  const typePill = `<span class="pill" style="background:#e0e7ff;color:#3730a3">${f.t === 'num' ? 'numeric' : 'categorical'}</span>`;
  hero.innerHTML = `
    <div class="ff-hero-main">
      <h1 class="ff-hero-name">${featName}</h1>
      <div class="ff-hero-meta">
        ${typePill} ${statusPill}
        <span>· importance rank <strong>#${idx + 1}</strong> of ${order.length}</span>
        <span>· gain <strong>${f.imp.toFixed(3)}</strong></span>
      </div>
    </div>
    <div class="ff-hero-nav">
      <button id="ff-prev" ${prevF ? '' : 'disabled'}>← ${prevF || 'Prev'}</button>
      <span class="ff-counter">${idx + 1} / ${order.length}</span>
      <button id="ff-next" ${nextF ? '' : 'disabled'}>${nextF || 'Next'} →</button>
    </div>
  `;
  mainEl.appendChild(hero);
  if (prevF) hero.querySelector('#ff-prev').onclick = () => navigate(`feature/${prevF}`);
  if (nextF) hero.querySelector('#ff-next').onclick = () => navigate(`feature/${nextF}`);

  // Compare control (appears below hero)
  mainEl.appendChild(compareControlBar([featName]));

  // ---------- KPI cards ----------
  const trainAUC = f.auc;
  const ootAUCdaily = dailyAUC[featName].slice(OOT_DAY);
  const ootAUC = ootAUCdaily.reduce((a, b) => a + b, 0) / ootAUCdaily.length;
  const deltaAUC = ootAUC - trainAUC;
  const ootMissing = dailyMiss[featName].slice(OOT_DAY).reduce((a, b) => a + b, 0) / ootAUCdaily.length;
  const zMax = anomZ[featName].reduce((m, v) => Math.abs(v) > Math.abs(m) ? v : m, 0);
  const zMaxDay = DATES[anomZ[featName].indexOf(zMax)] || DATES[0];

  const kpis = el('div', 'kpis');
  const deltaClass = deltaAUC < -0.1 ? 'delta-bad' : deltaAUC < -0.05 ? 'delta-warn' : 'delta-good';
  [
    { l: 'Train AUC',    v: trainAUC.toFixed(3), s: 'univariate, encoded vs label', cls: '' },
    { l: 'OOT AUC',      v: ootAUC.toFixed(3),   s: `<span class="${deltaClass}">Δ ${(deltaAUC >= 0 ? '+' : '') + deltaAUC.toFixed(3)}</span> vs train`, cls: deltaAUC < -0.1 ? 'kpi-bad' : deltaAUC < -0.05 ? 'kpi-warn' : '' },
    { l: 'OOT missing',  v: (ootMissing * 100).toFixed(1) + '%', s: `train: ${(f.miss * 100).toFixed(1)}%`, cls: ootMissing > 0.15 ? 'kpi-warn' : '' },
    { l: 'Peak |z|',     v: Math.abs(zMax).toFixed(1) + 'σ', s: `on ${zMaxDay}`, cls: Math.abs(zMax) > 3 ? 'kpi-warn' : '' },
  ].forEach(k => {
    const c = el('div', 'kpi ' + k.cls);
    c.innerHTML = `<div class="kpi-l">${k.l}</div><div class="kpi-v">${k.v}</div><div class="kpi-s">${k.s}</div>`;
    kpis.appendChild(c);
  });
  mainEl.appendChild(kpis);

  // ---------- Timeline at a glance: 4 small multiples ----------
  mainEl.appendChild(el('div', 'ff-section-hd', 'Timeline at a glance'));
  const timeline = el('div', 'ff-timeline');
  mainEl.appendChild(timeline);

  function miniChartBox(title, value, valueClass, sub, plotId) {
    const box = el('div', 'ff-mini');
    box.innerHTML = `<div class="ff-mini-t">${title}</div><div class="ff-mini-v ${valueClass || ''}">${value}</div><div class="ff-mini-s">${sub}</div>`;
    const plot = el('div'); plot.id = plotId; plot.style.height = '90px'; plot.style.marginTop = '4px';
    box.appendChild(plot);
    timeline.appendChild(box);
    return plot;
  }
  const miniLayout = (extra = {}) => baseLayout(Object.assign({
    margin: { t: 4, r: 8, b: 14, l: 28 },
    showlegend: false,
    xaxis: { showgrid: false, showticklabels: false, zeroline: false },
    yaxis: { gridcolor: '#f1f5f9', zeroline: false, tickfont: { size: 9 }, nticks: 3 },
    shapes: [ootLineShape(DATES[OOT_DAY])],
  }, extra));

  // 1) Daily AUC
  const aucPlot = miniChartBox('Daily AUC', trainAUC.toFixed(3), '', `median over ${N_DAYS}d`, 'ff-plot-auc');
  Plotly.newPlot(aucPlot, [{
    type: 'scatter', mode: 'lines', x: DATES, y: dailyAUC[featName],
    line: { color: '#6366f1', width: 1.6 },
    hovertemplate: '%{x}<br>AUC %{y:.3f}<extra></extra>'
  }], miniLayout({ yaxis: { range: [0.45, 0.92], gridcolor: '#f1f5f9', tickfont: { size: 9 }, nticks: 3 } }), COMMON_CFG);

  // 2) Missing
  const missPlot = miniChartBox('Missing rate', (f.miss * 100).toFixed(1) + '%', ootMissing > 0.15 ? 'delta-warn' : '', `OOT: ${(ootMissing * 100).toFixed(1)}%`, 'ff-plot-miss');
  Plotly.newPlot(missPlot, [{
    type: 'scatter', mode: 'lines', x: DATES, y: dailyMiss[featName],
    line: { color: '#0ea5e9', width: 1.4 }, fill: 'tozeroy', fillcolor: 'rgba(14,165,233,0.18)',
    hovertemplate: '%{x}<br>%{y:.1%}<extra></extra>'
  }], miniLayout({ yaxis: { tickformat: '.0%', rangemode: 'tozero', gridcolor: '#f1f5f9', tickfont: { size: 9 }, nticks: 3 } }), COMMON_CFG);

  // 3) Mean drift (z)
  const zPlot = miniChartBox('Mean drift', Math.abs(zMax).toFixed(1) + 'σ', Math.abs(zMax) > 3 ? 'delta-bad' : '', 'peak |z|', 'ff-plot-z');
  Plotly.newPlot(zPlot, [{
    type: 'scatter', mode: 'lines', x: DATES, y: anomMean[featName],
    line: { color: '#ef4444', width: 1.4 },
    hovertemplate: '%{x}<br>z=%{y:.2f}<extra></extra>'
  }], miniLayout({ yaxis: { zeroline: true, zerolinecolor: '#cbd5e1', gridcolor: '#f1f5f9', tickfont: { size: 9 }, nticks: 3 } }), COMMON_CFG);

  // 4) Weekly permutation importance
  const permMean = weeklyPerm[featName].reduce((a, b) => a + b, 0) / weeklyPerm[featName].length;
  const permPlot = miniChartBox('Permutation Δ AUC', permMean.toFixed(4), '', `mean over ${N_WEEKS} wk`, 'ff-plot-perm');
  Plotly.newPlot(permPlot, [{
    type: 'bar', x: WEEKS, y: weeklyPerm[featName],
    marker: { color: '#7c3aed' },
    hovertemplate: '%{x}<br>Δ AUC %{y:.4f}<extra></extra>'
  }], miniLayout({ yaxis: { rangemode: 'tozero', gridcolor: '#f1f5f9', tickfont: { size: 9 }, nticks: 3 }, shapes: [ootLineShape(WEEKS[OOT_WEEK])] }), COMMON_CFG);

  // ---------- Relationship with target ----------
  mainEl.appendChild(el('div', 'ff-section-hd', 'Relationship with target'));

  const b = behavior[featName];
  const behaveCard = chartCard(
    'Bucket behavior',
    'Bar: count (left axis) · Lines: in-bucket fraud rate and mean model score (right axis)',
    'ff-plot-behavior', 360
  );
  mainEl.appendChild(behaveCard.wrap);
  Plotly.newPlot(behaveCard.plot, [
    { type: 'bar', x: b.buckets, y: b.count, name: 'Count', marker: { color: '#8ecae6' } },
    { type: 'scatter', mode: 'lines+markers', x: b.buckets, y: b.fraudRate, name: 'Fraud rate',
      line: { color: '#e63946', width: 2.5 }, marker: { size: 7 }, yaxis: 'y2' },
    { type: 'scatter', mode: 'lines+markers', x: b.buckets, y: b.meanScore, name: 'Mean model score',
      line: { color: '#7209b7', width: 2.2, dash: 'dash' }, marker: { size: 6 }, yaxis: 'y2' },
  ], baseLayout({
    xaxis: { title: f.t === 'num' ? 'Quantile bucket' : 'Category', tickangle: f.t === 'cat' ? -30 : 0 },
    yaxis: { title: 'Count', gridcolor: '#f1f5f9' },
    yaxis2: { title: 'Rate / score', overlaying: 'y', side: 'right', rangemode: 'tozero' },
    legend: { orientation: 'h', y: -0.22, x: 0.5, xanchor: 'center' },
    margin: { t: 14, r: 60, b: 60, l: 70 }
  }), COMMON_CFG);

  // ---------- Type-specific detail row ----------
  if (f.t === 'num') {
    const row = el('div', 'row2');
    // PDP
    const p = pdp[featName];
    const pdpCard = chartCard('Partial dependence', `baseline mean p̂ = ${p.baseline.toFixed(3)}`, 'ff-plot-pdp', 300);
    row.appendChild(pdpCard.wrap);
    Plotly.newPlot(pdpCard.plot, [{
      type: 'scatter', mode: 'lines', x: p.xs, y: p.ys,
      line: { color: '#6366f1', width: 2.6 },
      hovertemplate: 'feature: %{x:.2f}<br>p̂: %{y:.3f}<extra></extra>',
      name: 'avg p(fraud)'
    }], baseLayout({
      xaxis: { title: `${featName} (scaled 0–1)`, gridcolor: '#f1f5f9' },
      yaxis: { title: 'avg p̂', gridcolor: '#f1f5f9', rangemode: 'tozero' },
      shapes: [{ type: 'line', x0: 0, x1: 1, xref: 'paper', y0: p.baseline, y1: p.baseline, line: { color: '#94a3b8', dash: 'dash', width: 1.3 }}],
      margin: { t: 14, r: 16, b: 46, l: 50 }, showlegend: false
    }), COMMON_CFG);

    // Spreads
    const s = spreads[featName];
    const spreadCard = chartCard('Distribution spreads', 'Daily IQR band, mean, and min/max', 'ff-plot-spread', 300);
    row.appendChild(spreadCard.wrap);
    Plotly.newPlot(spreadCard.plot, [
      { type: 'scatter', x: DATES, y: s.q1, mode: 'lines', line: { width: 0 }, showlegend: false, hoverinfo: 'skip' },
      { type: 'scatter', x: DATES, y: s.q3, mode: 'lines', fill: 'tonexty', fillcolor: 'rgba(99,102,241,0.20)',
        line: { width: 0 }, name: 'IQR', hoverinfo: 'skip' },
      { type: 'scatter', x: DATES, y: s.mean, mode: 'lines', name: 'mean', line: { color: '#c0392b', width: 1.8 },
        hovertemplate: '%{x}<br>mean: %{y:.1f}<extra></extra>' },
      { type: 'scatter', x: DATES, y: s.min, mode: 'lines', name: 'min', line: { color: '#94a3b8', dash: 'dot', width: 1 }, hoverinfo: 'skip' },
      { type: 'scatter', x: DATES, y: s.max, mode: 'lines', name: 'max', line: { color: '#475569', dash: 'dot', width: 1 }, hoverinfo: 'skip' },
    ], baseLayout({
      xaxis: { nticks: 8, showgrid: false },
      yaxis: { gridcolor: '#f1f5f9' },
      legend: { orientation: 'h', y: -0.22, x: 0.5, xanchor: 'center' },
      shapes: [ootLineShape(DATES[OOT_DAY])],
      margin: { t: 14, r: 16, b: 46, l: 50 }
    }), COMMON_CFG);
    mainEl.appendChild(row);
  } else {
    // Categorical: full-width stacked shares
    const palette = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#0ea5e9','#ec4899','#14b8a6','#64748b'];
    const shares = catShares[featName];
    const traces = f.cats.map((cat, i) => ({
      type: 'scatter', mode: 'lines', x: DATES, y: shares[i],
      stackgroup: 'one', name: cat,
      line: { width: 0.5, color: palette[i % palette.length] },
      fillcolor: palette[i % palette.length],
      hovertemplate: `${cat}: %{y:.1%}<extra></extra>`
    }));
    const catCard = chartCard('Daily category share', `${f.cats.length} categories · stacked to 100%`, 'ff-plot-cat', 320);
    mainEl.appendChild(catCard.wrap);
    Plotly.newPlot(catCard.plot, traces, baseLayout({
      xaxis: { nticks: 10, showgrid: false },
      yaxis: { title: 'share', range: [0, 1], tickformat: '.0%' },
      legend: { orientation: 'h', y: -0.2, x: 0.5, xanchor: 'center' },
      shapes: [ootLineShape(DATES[OOT_DAY])],
      margin: { t: 14, r: 16, b: 46, l: 50 }
    }), COMMON_CFG);
  }

  // ---------- Top interactions ----------
  mainEl.appendChild(el('div', 'ff-section-hd', 'Top interactions'));
  const partners = order.filter(n => n !== featName).slice(0, 3);
  const bivRow = el('div');
  bivRow.style.display = 'grid';
  bivRow.style.gridTemplateColumns = 'repeat(3, 1fr)';
  bivRow.style.gap = '12px';
  bivRow.style.marginBottom = '14px';
  // Responsive fallback handled by the row2 CSS on narrow viewports; here we just let it wrap
  if (window.innerWidth < 1000) bivRow.style.gridTemplateColumns = '1fr';
  partners.forEach((partner, i) => {
    const bv = bivariateFR(featName, partner);
    const card = chartCard(`${featName} × ${partner}`, 'fraud rate per (5×5) bin', `ff-plot-bv-${i}`, 260);
    bivRow.appendChild(card.wrap);

    }], baseLayout({
      xaxis: { title: { text: partner, font: { size: 10 } } },
      yaxis: { title: { text: featName, font: { size: 10 } }, autorange: 'reversed' },

    }), COMMON_CFG);

  mainEl.appendChild(bivRow);

  // ---------- Quick links to section pages ----------

  sectionLinks.forEach(sl => {
    const btn = el('button');
    btn.className = 'ff-jump-link';
    btn.style.marginLeft = '0';
    btn.textContent = sl.label + ' →';
    btn.onclick = () => navigate(sl.path, sl.q || {});
    links.appendChild(btn);
  });
  mainEl.appendChild(links);
}


/* =========================================================================
   FEATURE COMPARE — N-feature side-by-side view (up to 5)
   ========================================================================= */
function renderFeatureCompare(features) {
  const meta = compareMeta(features);
  const anchor = features[0];
  const N = features.length;
  const order = FEATURES_SORTED.map(x => x.n);
  const idxA = order.indexOf(anchor);
  const prevF = idxA > 0 ? order[idxA - 1] : null;
  const nextF = idxA < order.length - 1 ? order[idxA + 1] : null;

  // ---------- Hero ----------
  const hero = el('div', 'ff-hero ff-hero-compare');
  const nameHTML = meta.map((m, i) =>
    `<span><span class="ff-side-tag ${m.tagClass}">${m.tag}</span>${m.name}</span>` +
    (i < N - 1 ? `<span class="ff-vs">vs</span>` : '')
  ).join(' ');
  const typePillsHTML = meta.map(m => {
    const bg = m.feat.t === 'num' ? '#e0e7ff' : '#fee2e2';
    const fg = m.feat.t === 'num' ? '#3730a3' : '#991b1b';
    return `<span class="pill" style="background:${bg};color:${fg}">${m.tag}·${m.feat.t === 'num' ? 'numeric' : 'categorical'}</span>`;
  }).join(' ');
  hero.innerHTML = `
    <div class="ff-hero-main">
      <h1 class="ff-hero-name" style="font-size:18px">${nameHTML}</h1>
      <div class="ff-hero-meta">
        ${typePillsHTML}
        <span>· comparing ${N} features</span>
      </div>
    </div>
    <div class="ff-hero-nav">
      <button id="ff-prev" ${prevF ? '' : 'disabled'}>← A: ${prevF || 'Prev'}</button>
      <span class="ff-counter">${idxA + 1} / ${order.length}</span>
      <button id="ff-next" ${nextF ? '' : 'disabled'}>A: ${nextF || 'Next'} →</button>
    </div>
  `;
  mainEl.appendChild(hero);
  const vsParam = features.slice(1).join(',');
  if (prevF) hero.querySelector('#ff-prev').onclick = () => navigate(`feature/${prevF}`, { vs: vsParam });
  if (nextF) hero.querySelector('#ff-next').onclick = () => navigate(`feature/${nextF}`, { vs: vsParam });

  // Control chips
  mainEl.appendChild(compareControlBar(features));

  // ---------- KPI comparison table ----------
  function computeKPIs(name) {
    const f = FMAP[name];
    const dAUC = dailyAUC[name];
    const ootAUC = dAUC.slice(OOT_DAY).reduce((a, b) => a + b, 0) / (N_DAYS - OOT_DAY);
    const trainAUC = f.auc;
    const ootMiss = dailyMiss[name].slice(OOT_DAY).reduce((a, b) => a + b, 0) / (N_DAYS - OOT_DAY);
    const zPeak = anomZ[name].reduce((m, v) => Math.abs(v) > Math.abs(m) ? v : m, 0);
    const permMean = weeklyPerm[name].reduce((a, b) => a + b, 0) / weeklyPerm[name].length;
    return { imp: f.imp, trainAUC, ootAUC, deltaAUC: ootAUC - trainAUC, ootMiss, zPeak, permMean };
  }
  const kpis = features.map(computeKPIs);

  const metrics = [
    { key: 'imp',       m: 'Importance',         fmt: v => v.toFixed(3),                                   higherBetter: true  },
    { key: 'trainAUC',  m: 'Train AUC',          fmt: v => v.toFixed(3),                                   higherBetter: true  },
    { key: 'ootAUC',    m: 'OOT AUC',            fmt: v => v.toFixed(3),                                   higherBetter: true  },
    { key: 'deltaAUC',  m: 'Δ AUC (Val→OOT)',    fmt: v => (v >= 0 ? '+' : '') + v.toFixed(3),             higherBetter: true  },
    { key: 'ootMiss',   m: 'OOT missing rate',   fmt: v => (v * 100).toFixed(1) + '%',                     higherBetter: false },
    { key: 'zPeak',     m: 'Peak |z|',           fmt: v => Math.abs(v).toFixed(1) + 'σ',                   higherBetter: false, absolute: true },
    { key: 'permMean',  m: 'Mean permutation Δ', fmt: v => v.toFixed(4),                                   higherBetter: true  },
  ];

  const tbl = el('table', 'compare-tbl');
  const headerCells = meta.map(m => `<th><span class="ff-side-tag ${m.tagClass}">${m.tag}</span>${m.name}</th>`).join('');
  const rowsHTML = metrics.map(met => {
    const values = kpis.map(k => k[met.key]);
    const compValues = met.absolute ? values.map(Math.abs) : values;
    const best = met.higherBetter ? Math.max(...compValues) : Math.min(...compValues);
    const worst = met.higherBetter ? Math.min(...compValues) : Math.max(...compValues);
    const cells = values.map((v, i) => {
      const c = compValues[i];
      const cls = (N > 1 && c === best) ? 'best-cell' : (N > 2 && c === worst) ? 'worst-cell' : '';
      return `<td class="${cls}">${met.fmt(v)}</td>`;
    }).join('');
    return `<tr><td class="metric-name">${met.m}</td>${cells}</tr>`;
  }).join('');
  tbl.innerHTML = `<thead><tr><th>Metric</th>${headerCells}</tr></thead><tbody>${rowsHTML}</tbody>`;
  mainEl.appendChild(tbl);

  // ---------- Timeline at a glance — overlay N features per mini ----------
  mainEl.appendChild(el('div', 'ff-section-hd', 'Timeline at a glance'));
  const timeline = el('div', 'ff-timeline');
  mainEl.appendChild(timeline);

  const miniLayoutBase = (extra = {}) => baseLayout(Object.assign({
    margin: { t: 4, r: 8, b: 14, l: 28 },
    showlegend: false,
    xaxis: { showgrid: false, showticklabels: false, zeroline: false },
    yaxis: { gridcolor: '#f1f5f9', zeroline: false, tickfont: { size: 9 }, nticks: 3 },
    shapes: [ootLineShape(DATES[OOT_DAY])],
  }, extra));

  const legendHTML = meta.map(m =>
    `<span><span class="mini-legend-swatch" style="background:${m.color}"></span>${m.tag}</span>`
  ).join('');

  function overlayMini(title, plotId, seriesBuilder, layout) {
    const box = el('div', 'ff-mini');
    box.innerHTML = `<div class="ff-mini-t">${title}</div><div class="mini-legend">${legendHTML}</div>`;
    const plot = el('div'); plot.id = plotId; plot.style.height = '110px'; plot.style.marginTop = '4px';
    box.appendChild(plot);
    timeline.appendChild(box);
    Plotly.newPlot(plot, meta.map(seriesBuilder), layout, COMMON_CFG);
  }

  overlayMini('Daily AUC', 'ff-plot-cmp-auc', (m) => ({
    type: 'scatter', mode: 'lines', x: DATES, y: dailyAUC[m.name],
    line: { color: m.color, width: 1.4 }, name: m.tag,
    hovertemplate: `${m.tag}: %{y:.3f}<extra></extra>`
  }), miniLayoutBase({ yaxis: { range: [0.45, 0.92], gridcolor: '#f1f5f9', tickfont: { size: 9 }, nticks: 3 } }));

  overlayMini('Missing rate', 'ff-plot-cmp-miss', (m) => ({
    type: 'scatter', mode: 'lines', x: DATES, y: dailyMiss[m.name],
    line: { color: m.color, width: 1.3 }, name: m.tag,
    hovertemplate: `${m.tag}: %{y:.1%}<extra></extra>`
  }), miniLayoutBase({ yaxis: { tickformat: '.0%', rangemode: 'tozero', gridcolor: '#f1f5f9', tickfont: { size: 9 }, nticks: 3 } }));

  overlayMini('Mean drift (z)', 'ff-plot-cmp-z', (m) => ({
    type: 'scatter', mode: 'lines', x: DATES, y: anomMean[m.name],
    line: { color: m.color, width: 1.2 }, name: m.tag,
    hovertemplate: `${m.tag} z=%{y:.2f}<extra></extra>`
  }), miniLayoutBase({ yaxis: { zeroline: true, zerolinecolor: '#cbd5e1', gridcolor: '#f1f5f9', tickfont: { size: 9 }, nticks: 3 } }));

  overlayMini('Permutation Δ AUC (weekly)', 'ff-plot-cmp-perm', (m) => ({
    type: 'scatter', mode: 'lines+markers', x: WEEKS, y: weeklyPerm[m.name],
    line: { color: m.color, width: 1.5 }, marker: { size: 3 }, name: m.tag,
    hovertemplate: `${m.tag}: %{y:.4f}<extra></extra>`
  }), miniLayoutBase({ yaxis: { rangemode: 'tozero', gridcolor: '#f1f5f9', tickfont: { size: 9 }, nticks: 3 }, shapes: [ootLineShape(WEEKS[OOT_WEEK])] }));

  // ---------- Behavior — side-by-side, responsive grid ----------
  mainEl.appendChild(el('div', 'ff-section-hd', `Bucket behavior — side by side (${N} features)`));
  const behaveGrid = el('div', 'compare-grid-n');
  mainEl.appendChild(behaveGrid);
  meta.forEach((m, i) => {
    const b = behavior[m.name];
    const card = chartCard(
      `<span class="ff-side-tag ${m.tagClass}">${m.tag}</span> ${m.name}`,
      'Count (left) · fraud rate + mean score (right)',
      `ff-plot-cmp-bh-${i}`, 300
    );
    behaveGrid.appendChild(card.wrap);
    Plotly.newPlot(card.plot, [
      { type: 'bar', x: b.buckets, y: b.count, name: 'Count', marker: { color: '#cbd5e1' } },
      { type: 'scatter', mode: 'lines+markers', x: b.buckets, y: b.fraudRate, name: 'Fraud rate',
        line: { color: m.color, width: 2.4 }, marker: { size: 5 }, yaxis: 'y2' },
      { type: 'scatter', mode: 'lines+markers', x: b.buckets, y: b.meanScore, name: 'Mean score',
        line: { color: m.color, width: 1.8, dash: 'dot' }, marker: { size: 4 }, yaxis: 'y2' },
    ], baseLayout({
      xaxis: { title: m.feat.t === 'num' ? 'Quantile bucket' : 'Category', tickangle: m.feat.t === 'cat' ? -30 : 0, tickfont: { size: 10 } },
      yaxis: { title: 'Count', gridcolor: '#f1f5f9' },
      yaxis2: { title: 'Rate / score', overlaying: 'y', side: 'right', rangemode: 'tozero' },
      showlegend: false,
      margin: { t: 14, r: 50, b: 54, l: 50 }
    }), COMMON_CFG);
  });

  // ---------- Relationship section ----------
  mainEl.appendChild(el('div', 'ff-section-hd', 'Relationship with target'));
  const allNumeric = meta.every(m => m.feat.t === 'num');

  if (allNumeric) {
    // Overlay all PDPs
    const pdpCard = chartCard('Partial dependence — overlay', 'p(fraud) vs. feature value (each scaled 0–1)', 'ff-plot-cmp-pdp', 330);
    mainEl.appendChild(pdpCard.wrap);
    const pdpTraces = meta.map(m => {
      const p = pdp[m.name];
      return {
        type: 'scatter', mode: 'lines', x: p.xs, y: p.ys,
        name: `${m.tag}: ${m.name}`,
        line: { color: m.color, width: 2.4 },
        hovertemplate: `${m.tag} x=%{x:.2f}<br>p̂=%{y:.3f}<extra></extra>`
      };
    });
    Plotly.newPlot(pdpCard.plot, pdpTraces, baseLayout({
      xaxis: { title: 'feature value (scaled 0–1)', gridcolor: '#f1f5f9' },
      yaxis: { title: 'avg p̂', gridcolor: '#f1f5f9', rangemode: 'tozero' },
      legend: { orientation: 'h', y: -0.22, x: 0.5, xanchor: 'center' },
      margin: { t: 14, r: 16, b: 50, l: 50 }
    }), COMMON_CFG);

    // Spreads grid
    const spreadGrid = el('div', 'compare-grid-n');
    mainEl.appendChild(spreadGrid);
    meta.forEach((m, i) => {
      const s = spreads[m.name];
      const card = chartCard(
        `<span class="ff-side-tag ${m.tagClass}">${m.tag}</span> Spread · ${m.name}`,
        'IQR band + mean, daily',
        `ff-plot-cmp-sp-${i}`, 260
      );
      spreadGrid.appendChild(card.wrap);
      Plotly.newPlot(card.plot, [
        { type: 'scatter', x: DATES, y: s.q1, mode: 'lines', line: { width: 0 }, showlegend: false, hoverinfo: 'skip' },
        { type: 'scatter', x: DATES, y: s.q3, mode: 'lines', fill: 'tonexty', fillcolor: m.color + '30',
          line: { width: 0 }, name: 'IQR', hoverinfo: 'skip' },
        { type: 'scatter', x: DATES, y: s.mean, mode: 'lines', name: 'mean', line: { color: m.color, width: 1.8 },
          hovertemplate: '%{x}<br>mean: %{y:.1f}<extra></extra>' },
      ], baseLayout({
        xaxis: { nticks: 6, showgrid: false, tickfont: { size: 9 } },
        yaxis: { gridcolor: '#f1f5f9', tickfont: { size: 9 } },
        showlegend: false,
        shapes: [ootLineShape(DATES[OOT_DAY])],
        margin: { t: 14, r: 16, b: 36, l: 44 }
      }), COMMON_CFG);
    });
  } else {
    // Mixed types — each feature gets the panel that fits it
    const detailGrid = el('div', 'compare-grid-n');
    mainEl.appendChild(detailGrid);
    meta.forEach((m, i) => {
      if (m.feat.t === 'num') {
        const p = pdp[m.name];
        const card = chartCard(
          `<span class="ff-side-tag ${m.tagClass}">${m.tag}</span> PDP · ${m.name}`,
          `baseline p̂ = ${p.baseline.toFixed(3)}`,
          `ff-plot-cmp-rel-${i}`, 260
        );
        detailGrid.appendChild(card.wrap);
        Plotly.newPlot(card.plot, [{
          type: 'scatter', mode: 'lines', x: p.xs, y: p.ys,
          line: { color: m.color, width: 2.4 },
          hovertemplate: 'x=%{x:.2f}<br>p̂=%{y:.3f}<extra></extra>'
        }], baseLayout({
          xaxis: { title: 'scaled 0–1', gridcolor: '#f1f5f9', tickfont: { size: 9 } },
          yaxis: { title: 'avg p̂', gridcolor: '#f1f5f9', rangemode: 'tozero', tickfont: { size: 9 } },
          showlegend: false,
          margin: { t: 14, r: 16, b: 40, l: 44 }
        }), COMMON_CFG);
      } else {
        const palette = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#0ea5e9','#ec4899','#14b8a6','#64748b'];
        const shares = catShares[m.name];
        const traces = m.feat.cats.map((cat, k) => ({
          type: 'scatter', mode: 'lines', x: DATES, y: shares[k],
          stackgroup: 'one', name: cat,
          line: { width: 0.5, color: palette[k % palette.length] },
          fillcolor: palette[k % palette.length],
          hovertemplate: `${cat}: %{y:.1%}<extra></extra>`
        }));
        const card = chartCard(
          `<span class="ff-side-tag ${m.tagClass}">${m.tag}</span> Category shares · ${m.name}`,
          `${m.feat.cats.length} categories · stacked`,
          `ff-plot-cmp-rel-${i}`, 260
        );
        detailGrid.appendChild(card.wrap);
        Plotly.newPlot(card.plot, traces, baseLayout({
          xaxis: { nticks: 6, showgrid: false, showticklabels: false },
          yaxis: { range: [0, 1], tickformat: '.0%', tickfont: { size: 9 } },
          legend: { orientation: 'h', y: -0.18, x: 0.5, xanchor: 'center', font: { size: 8 } },
          shapes: [ootLineShape(DATES[OOT_DAY])],
          margin: { t: 14, r: 16, b: 30, l: 44 }
        }), COMMON_CFG);
      }
    });
  }

  // ---------- Pair interactions (A × each other feature) ----------
  if (N > 1) {
    mainEl.appendChild(el('div', 'ff-section-hd', `Pair interactions: ${anchor} × each other`));
    const pairGrid = el('div', 'compare-grid-n');
    mainEl.appendChild(pairGrid);
    meta.slice(1).forEach((m, i) => {
      const bv = bivariateFR(anchor, m.name);
      const card = chartCard(
        `<span class="ff-side-tag ff-side-a">A</span> ${anchor} × <span class="ff-side-tag ${m.tagClass}">${m.tag}</span> ${m.name}`,
        'Fraud rate per (5×5) bin',
        `ff-plot-cmp-bv-${i}`, 300
      );
      pairGrid.appendChild(card.wrap);
      const text = bv.z.map(row => row.map(v => `${(v*100).toFixed(1)}%`));
      Plotly.newPlot(card.plot, [{
        type: 'heatmap', z: bv.z,
        x: ['Q1','Q2','Q3','Q4','Q5'], y: ['Q1','Q2','Q3','Q4','Q5'],
        colorscale: 'Reds', zmin: 0,
        text, texttemplate: '%{text}', textfont: { size: 9 },
        showscale: false,
        hovertemplate: `${anchor} %{y}<br>${m.name} %{x}<br>%{z:.1%}<extra></extra>`
      }], baseLayout({
        xaxis: { title: { text: m.name, font: { size: 10 } } },
        yaxis: { title: { text: anchor, font: { size: 10 } }, autorange: 'reversed' },
        margin: { t: 14, r: 10, b: 40, l: 50 }
      }), COMMON_CFG);
    });
  }
}

/* =========================================================================
   INIT
   ========================================================================= */
searchEl.addEventListener('input', e => renderNav(e.target.value));

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  // Don't trigger when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  // '/' focuses search
  if (e.key === '/') { e.preventDefault(); searchEl.focus(); return; }
  // j/k or arrow keys: prev/next feature on focus page
  const parts = currentPath.split('/');
  if (parts[0] === 'feature' && parts[1]) {
    const order = FEATURES_SORTED.map(x => x.n);
    const idx = order.indexOf(parts[1]);
    if ((e.key === 'j' || e.key === 'ArrowRight') && idx < order.length - 1) {
      e.preventDefault(); navigate(`feature/${order[idx + 1]}`);
    } else if ((e.key === 'k' || e.key === 'ArrowLeft') && idx > 0) {
      e.preventDefault(); navigate(`feature/${order[idx - 1]}`);
    }
  }
});

renderNav();
updateFooter();
const initial = (location.hash.replace(/^#\/?/, '') || 'overview').split('?');
currentPath = initial[0] || 'overview';
const initParams = Object.fromEntries(new URLSearchParams(initial[1] || ''));
renderCrumbs();
updateActive();
render(initParams);
</script>
</body>
</html>
