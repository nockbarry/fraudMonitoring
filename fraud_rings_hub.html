<script>
/* ============================================================================
   Seeded PRNG so synthetic story renders identically across reloads.
   ============================================================================ */
function mulberry32(seed) {
  return function () {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function gauss(rng) {
  let u = 0, v = 0;
  while (u === 0) u = rng();
  while (v === 0) v = rng();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
const rng = mulberry32(20260429);

const FONT = { family: 'Inter, -apple-system, Segoe UI, Roboto, sans-serif', size: 11, color: '#334155' };

  good: '#10b981', warn: '#f59e0b', bad: '#ef4444', accent: '#6366f1',

};

const clip = (x, lo, hi) => Math.max(lo, Math.min(hi, x));

// Master feature pool used for per-ring feature-signal vectors.
const FEATURE_POOL = [

  card_test:     { top: ['velocity_cnt_card_24h','3ds_fail','declined_attempts_7d','velocity_amt_card_1h','merchant_age_under_30d','device_num_accounts'], weight: 0.88 },
  bust_out:      { top: ['amt_band_high','amt_z_account','card_tenure_days','merchant_age_under_30d','velocity_amt_card_7d','high_amt_x_new_merchant'], weight: 0.55 },
  ato:           { top: ['device_changed_recent','session_duration_dev','keystroke_var_dev','ip_is_vpn','address_match_score','ip_anon_share'], weight: 0.78 },

   Generate synthetic ring data
   ============================================================================ */

const dates = Array.from({ length: N_DAYS }, (_, i) => {

// Archetype templates: ring size distribution + behavior fingerprint

  promo_abuse:   { count: 30, n_acct: [110, 28], n_card: [130, 30],  n_dev: [70, 18], n_ip: [55, 15], $exp: [28_000, 9_000],   shareDev: 0.40, shareIp: 0.32, baseline_auc: 0.71, tx_per_acct: [4, 1.5] },
};

const STATUSES = ['active', 'monitoring', 'investigating', 'blocked'];
const STATUS_PROB = [0.32, 0.28, 0.18, 0.22];

const DETECTION_METHODS = [
  'shared_device', 'shared_ip_behavior', 'velocity_cluster', 'embedding_similarity',
  'graph_clustering', 'device_fingerprint_match', 'analyst_referral', 'behavioral_outlier',
];

const RINGS = [];
let ringCounter = 0;
let entityCounter = { acct: 0, card: 0, dev: 0, ip: 0, merch: 0 };

function pickStatus() {
  let r = rng();
  for (let i = 0; i < STATUSES.length; i++) {
    r -= STATUS_PROB[i];
    if (r < 0) return STATUSES[i];
  }
  return STATUSES[STATUSES.length - 1];
}

function makeEntities(prefix, n, counter) {
  const out = [];
  for (let i = 0; i < n; i++) {
    out.push(`${prefix}_${(counter + i).toString().padStart(5, '0')}`);
  }
  return out;
}

Object.entries(ARCH_TPL).forEach(([arch, tpl]) => {
  for (let i = 0; i < tpl.count; i++) {
    const id = `R${ringCounter.toString().padStart(3, '0')}`;
    ringCounter++;
    const n_acct = Math.max(2, Math.round(tpl.n_acct[0] + gauss(rng) * tpl.n_acct[1]));
    const n_card = Math.max(2, Math.round(tpl.n_card[0] + gauss(rng) * tpl.n_card[1]));
    const n_dev  = Math.max(1, Math.round(tpl.n_dev[0]  + gauss(rng) * tpl.n_dev[1]));
    const n_ip   = Math.max(1, Math.round(tpl.n_ip[0]   + gauss(rng) * tpl.n_ip[1]));
    const n_merch = Math.max(1, Math.round(2 + Math.abs(gauss(rng)) * 4));
    const $exp = Math.max(500, tpl.$exp[0] + gauss(rng) * tpl.$exp[1]);
    const captureRate = 0.35 + 0.45 * rng();
    const $cap = $exp * captureRate;
    const status = pickStatus();
    // Day of first sighting biased earlier; peak around 2/3 of lifetime; last_seen near end
    const first_day = Math.floor(rng() * (N_DAYS - 25));
    const lifetime  = Math.max(7, Math.round(20 + Math.abs(gauss(rng)) * 25));
    const last_day  = Math.min(N_DAYS - 1, first_day + lifetime);
    const peak_day  = first_day + Math.floor(lifetime * (0.55 + 0.2 * rng()));

    const accts = makeEntities('A', n_acct, entityCounter.acct); entityCounter.acct += n_acct;
    const cards = makeEntities('C', n_card, entityCounter.card); entityCounter.card += n_card;
    const devs  = makeEntities('D', n_dev,  entityCounter.dev);  entityCounter.dev  += n_dev;
    const ips   = makeEntities('I', n_ip,   entityCounter.ip);   entityCounter.ip   += n_ip;
    const merchs = makeEntities('M', n_merch, entityCounter.merch); entityCounter.merch += n_merch;

    RINGS.push({
      id, arch, status,
      n_acct, n_card, n_dev, n_ip, n_merch,
      $exp, $cap, captureRate,
      first_day, last_day, peak_day, lifetime,
      detection: DETECTION_METHODS[Math.floor(rng() * DETECTION_METHODS.length)],
      analyst: ['M. Patel', 'L. Tanaka', 'S. Okafor', 'R. Volkov', 'J. Mendes'][Math.floor(rng() * 5)],
      accts, cards, devs, ips, merchs,
      shareDev: tpl.shareDev, shareIp: tpl.shareIp,
    });
  }
});

// --- Cross-ring entity overlap: have ~10% of devices and ~8% of IPs appear in 2-3 rings ---
const overlapEdges = []; // pairs of {a:ringId, b:ringId, kind, count}
const dev2rings = {};
const ip2rings  = {};
RINGS.forEach(r => {
  r.devs.forEach(d => { (dev2rings[d] = dev2rings[d] || []).push(r.id); });
  r.ips.forEach(ip => { (ip2rings[ip]  = ip2rings[ip]  || []).push(r.id); });
});
// Plant overlap: pick a sample of devices from large rings and add them to other rings
const candidateDevs = Object.entries(dev2rings).map(([d, rs]) => ({ d, rs }));
candidateDevs.forEach(({ d, rs }) => {
  if (rng() < 0.10) {
    const others = RINGS.filter(r => !rs.includes(r.id));
    if (others.length === 0) return;
    const target = others[Math.floor(rng() * others.length)];
    target.devs.push(d);
    target.shared_devs = (target.shared_devs || 0) + 1;
    dev2rings[d].push(target.id);
  }
});
const candidateIps = Object.entries(ip2rings).map(([ip, rs]) => ({ ip, rs }));
candidateIps.forEach(({ ip, rs }) => {
  if (rng() < 0.08) {
    const others = RINGS.filter(r => !rs.includes(r.id));
    if (others.length === 0) return;
    const target = others[Math.floor(rng() * others.length)];
    target.ips.push(ip);
    target.shared_ips = (target.shared_ips || 0) + 1;
    ip2rings[ip].push(target.id);
  }
});
// Build overlap edges (ring-pair counts)
const ringPairs = {};
function addPair(a, b, kind) {
  if (a === b) return;
  const key = a < b ? `${a}|${b}|${kind}` : `${b}|${a}|${kind}`;
  ringPairs[key] = (ringPairs[key] || 0) + 1;
}
Object.values(dev2rings).forEach(rs => {
  if (rs.length < 2) return;
  for (let i = 0; i < rs.length; i++) for (let j = i + 1; j < rs.length; j++) addPair(rs[i], rs[j], 'dev');
});
Object.values(ip2rings).forEach(rs => {
  if (rs.length < 2) return;
  for (let i = 0; i < rs.length; i++) for (let j = i + 1; j < rs.length; j++) addPair(rs[i], rs[j], 'ip');
});
Object.entries(ringPairs).forEach(([k, count]) => {
  const [a, b, kind] = k.split('|');
  overlapEdges.push({ a, b, kind, count });
});

// --- Daily timeline: per-ring $ exposure, tx count, model score, recall ---
RINGS.forEach(r => {
  const tpl = ARCH_TPL[r.arch];
  const total_tx = Math.max(5, Math.round(r.n_acct * (tpl.tx_per_acct[0] + gauss(rng) * tpl.tx_per_acct[1])));
  r.total_tx = total_tx;

  // Per-ring model AUC: archetype baseline + idiosyncratic noise. Some rings
  // are well-covered, some are blind spots.
  const ringAucNoise = gauss(rng) * 0.06;
  // Older / longer-lived rings tend to be slightly worse-covered (attackers adapt)
  const lifetimePenalty = Math.min(0.05, r.lifetime * 0.0008);
  r.model_auc = clip(tpl.baseline_auc + ringAucNoise - lifetimePenalty, 0.50, 0.99);
  // Recall at 2% alert depth, derived from AUC roughly (and bounded).
  r.model_recall_2pct = clip((r.model_auc - 0.5) * 1.5 + 0.05 + gauss(rng) * 0.04, 0.0, 0.95);
  // Mean model score on this ring's transactions across the lifetime.
  r.mean_score = clip(0.04 + (r.model_auc - 0.5) * 0.42 + gauss(rng) * 0.03, 0.005, 0.95);

  // Daily lifecycle shape (triangular: ramp to peak, decay)
  const dailyShape = dates.map((d, di) => {
    if (di < r.first_day || di > r.last_day) return 0;
    const t = (di - r.first_day) / Math.max(1, r.lifetime);
    const peakT = (r.peak_day - r.first_day) / Math.max(1, r.lifetime);
    return t <= peakT ? t / peakT : 1 - (t - peakT) / (1 - peakT + 0.01);
  });
  r.daily_dollars = dailyShape.map((v, di) => {
    if (v === 0) return 0;
    const noise = 0.15 * Math.abs(gauss(rng));
    return Math.max(0, r.$exp * v / r.lifetime * (1 + noise));
  });
  r.daily_tx_count = dailyShape.map((v, di) => {
    if (v === 0) return 0;
    const noise = 0.20 * Math.abs(gauss(rng));
    return Math.round(Math.max(0, total_tx * v / r.lifetime * (1 + noise)));
  });
  // Daily mean score: drifts a bit over the ring's lifetime (model adapts late
  // for some rings; for others the score collapses as attackers adapt away).
  const scoreDrift = gauss(rng) * 0.10;   // direction of per-ring score drift
  r.daily_avg_score = dailyShape.map((v, di) => {
    if (v === 0) return null;
    const t = (di - r.first_day) / Math.max(1, r.lifetime);
    const drift = scoreDrift * (t - 0.5);
    return clip(r.mean_score + drift + gauss(rng) * 0.02, 0.005, 0.99);
  });
  // Daily recall: same baseline shape but noisier; some rings show clear
  // recall growth as model retrains (positive scoreDrift) and others decay.
  r.daily_recall = dailyShape.map((v, di) => {
    if (v === 0) return null;
    const t = (di - r.first_day) / Math.max(1, r.lifetime);
    const drift = scoreDrift * 1.4 * (t - 0.5);
    return clip(r.model_recall_2pct + drift + gauss(rng) * 0.05, 0.0, 1.0);
  });
  r.daily_alerts = r.daily_tx_count.map((tx, di) => Math.round(tx * (0.02 + r.model_recall_2pct * 0.10) + Math.abs(gauss(rng))));

  // Feature-signal vector: archetype top-K features with per-ring strength.
  const profile = ARCH_FEATURE_PROFILE[r.arch];
  r.feature_signal = profile.top.map((f, i) => ({
    name: f,
    strength: clip(profile.weight * (1 - i * 0.10) + gauss(rng) * 0.07, 0.05, 0.99),
  }));
});

/* ============================================================================

   ============================================================================ */
function ringLayout(ring) {
  // Place ring entities in concentric rings around a center.
  // Each entity type gets its own radius and angular slot.
  const cx = 0, cy = 0;
  const layers = [
    { kind: 'acct',  ents: ring.accts,  r: 1.0,  color: COLORS.acct },
    { kind: 'card',  ents: ring.cards,  r: 1.7,  color: COLORS.card },
    { kind: 'dev',   ents: ring.devs,   r: 0.5,  color: COLORS.dev },
    { kind: 'ip',    ents: ring.ips,    r: 0.5,  color: COLORS.ip, offset: Math.PI },
    { kind: 'merch', ents: ring.merchs, r: 2.3,  color: COLORS.merch },
  ];
  const nodes = [];
  layers.forEach(L => {
    const n = L.ents.length;
    L.ents.forEach((id, i) => {
      const th = (L.offset || 0) + (i / Math.max(n, 1)) * Math.PI * 2;
      nodes.push({
        id, kind: L.kind, color: L.color,
        x: cx + L.r * Math.cos(th),
        y: cy + L.r * Math.sin(th),
      });
    });
  });
  // Edges: account ↔ each card (1-to-many), account ↔ device (sample), account ↔ ip (sample), card ↔ merchant
  const edges = [];
  const cardsPerAcct = Math.ceil(ring.n_card / Math.max(ring.n_acct, 1));
  ring.accts.forEach((aid, ai) => {
    for (let k = 0; k < cardsPerAcct; k++) {
      const cIdx = (ai * cardsPerAcct + k) % ring.n_card;
      edges.push({ a: aid, b: ring.cards[cIdx], kind: 'acct-card' });
    }
    edges.push({ a: aid, b: ring.devs[ai % ring.n_dev], kind: 'acct-dev' });
    edges.push({ a: aid, b: ring.ips[ai % ring.n_ip],   kind: 'acct-ip' });
  });
  ring.cards.forEach((cid, ci) => {
    edges.push({ a: cid, b: ring.merchs[ci % ring.n_merch], kind: 'card-merch' });
  });
  return { nodes, edges };
}

function macroLayout() {
  // Position rings on a grid (sorted by archetype, then by exposure)
  const groups = {};
  RINGS.forEach(r => { (groups[r.arch] = groups[r.arch] || []).push(r); });
  const out = [];
  let archIdx = 0;
  const archOrder = ARCH_ORDER;
  archOrder.forEach(a => {
    if (!groups[a]) return;
    groups[a].sort((x, y) => y.$exp - x.$exp);
    const radius = 4 + archIdx * 5;
    const n = groups[a].length;
    groups[a].forEach((r, i) => {
      const theta = (i / Math.max(n, 1)) * Math.PI * 2 + archIdx * 0.1;
      out.push({
        id: r.id, arch: a, status: r.status, $exp: r.$exp, n_acct: r.n_acct,
        x: radius * Math.cos(theta),
        y: radius * Math.sin(theta),
      });
    });
    archIdx++;
  });
  return out;
}

};

  ));

/* -------------------- FEATURE SIGNALS -------------------- */
ROUTES['signals'] = () => {
  const m = main();
  m.appendChild(pageHeader(
    'Feature signals',
    `Per-archetype map of which features carry signal. Each archetype "lights up" different features — the velocity stack catches card-testing, behavioral biometrics catch ATO, lifecycle features catch bust-out. Knowing which features matter for which archetype tells you where to invest in feature engineering and where to stop wasting effort.`
  ));

  // Build matrix: rows = features in pool, cols = archetypes, values = mean strength of feature for rings of that archetype
  const featByArch = {};
  ARCH_ORDER.forEach(a => {
    featByArch[a] = {};
    FEATURE_POOL.forEach(f => featByArch[a][f] = 0);
    const rs = RINGS.filter(r => r.arch === a);
    rs.forEach(r => {
      r.feature_signal.forEach(({ name, strength }) => {
        if (featByArch[a][name] != null) featByArch[a][name] += strength;
      });
    });
    Object.keys(featByArch[a]).forEach(f => {
      featByArch[a][f] = rs.length ? featByArch[a][f] / rs.length : 0;
    });
  });

  // Sort features by total signal across archetypes (most "active" features first)
  const featTotal = FEATURE_POOL.map(f => ({
    f, total: ARCH_ORDER.reduce((s, a) => s + featByArch[a][f], 0),
  })).sort((a, b) => b.total - a.total);
  const sortedFeats = featTotal.map(x => x.f);

  // Heatmap
  const cHeat = chartCard('Feature × archetype signal strength',
    'Cells show mean per-ring feature-signal strength. Darker = the feature lights up reliably for rings of that archetype. Sparse rows mean the feature only matters for one or two archetypes — those features should be evaluated against the cohorts they actually serve.');
  m.appendChild(cHeat.wrap);
  const z = sortedFeats.map(f => ARCH_ORDER.map(a => featByArch[a][f]));
  Plotly.newPlot(cHeat.plot, [{
    z, x: ARCH_ORDER.map(a => ARCH_LABEL[a]), y: sortedFeats,
    type: 'heatmap', colorscale: 'Purples', zmin: 0, zmax: 0.9,
    hovertemplate: '<b>%{y}</b><br>%{x}<br>signal %{z:.2f}<extra></extra>',
  }], baseLayout({
    xaxis: { tickangle: -25 },
    margin: { t: 30, r: 30, b: 90, l: 220 },
    height: 600,
  }), CFG);

  // Side-by-side: per-archetype top-features and per-feature multi-archetype hits
  const r2 = el('div', 'row2');
  const cTopByArch = chartCard('Top 5 features per archetype',
    'Quick reference: each archetype\'s strongest signals. The top feature for one archetype is often near the bottom for another — there is no universal "best" feature.');
  r2.appendChild(cTopByArch.wrap);
  const traces = ARCH_ORDER.slice(0, 6).map((a, i) => {
    const top = Object.entries(featByArch[a]).sort((x, y) => y[1] - x[1]).slice(0, 5);
    return {
      x: top.map(([_, v]) => v),
      y: top.map(([f, _]) => f.length > 22 ? f.slice(0, 20) + '…' : f),
      type: 'bar', orientation: 'h', name: ARCH_LABEL[a],
      marker: { color: COLORS[a] },
      visible: i === 0 ? true : 'legendonly',
    };
  });
  Plotly.newPlot(cTopByArch.plot, traces, baseLayout({
    xaxis: { title: 'signal', range: [0, 1] },
    yaxis: { autorange: 'reversed' },
    height: 360, margin: { t: 20, r: 20, b: 46, l: 180 },
    legend: { orientation: 'v', x: 1.02, y: 1, font: { size: 10 } },
  }), CFG);

  const cBreadth = chartCard('Feature breadth — how many archetypes light up each feature',
    'Features at the top "light up" across many archetypes (broad-spectrum signals). Features at the bottom only fire for one or two archetypes (specialist signals — keep them but don\'t expect them to generalize).');
  r2.appendChild(cBreadth.wrap);
  const breadth = sortedFeats.map(f => ({
    f,
    archCount: ARCH_ORDER.filter(a => featByArch[a][f] > 0.4).length,
    maxStrength: Math.max(...ARCH_ORDER.map(a => featByArch[a][f])),
  })).sort((a, b) => b.archCount - a.archCount).slice(0, 18);
  Plotly.newPlot(cBreadth.plot, [{
    x: breadth.map(b => b.archCount),
    y: breadth.map(b => b.f),
    type: 'bar', orientation: 'h',
    marker: { color: breadth.map(b => b.archCount >= 5 ? COLORS.good : b.archCount >= 3 ? COLORS.warn : COLORS.accent) },
    text: breadth.map(b => `${b.archCount} archs`),
    textposition: 'outside',
  }], baseLayout({
    xaxis: { title: '# archetypes where signal > 0.4' },
    yaxis: { autorange: 'reversed' }, showlegend: false,
    margin: { t: 20, r: 60, b: 46, l: 180 }, height: 360,
  }), CFG);
  m.appendChild(r2);

  m.appendChild(makeCallout('Reading this together with model coverage',
    `Archetypes with low model AUC (refund, first-party, friendly) tend to have signal vectors that overlap with archetypes the model already handles — meaning the existing features can\'t separate them. New feature investment should target the archetype-specific signatures: chargeback ratios for refund/friendly, origination/repayment features for first-party, merchant-onboarding telemetry for triangulation.`,
    'info'));
};

  Plotly.newPlot(cA.plot, [{
    x: counts, y: methods.map(m_ => m_.replace(/_/g, ' ')),
    type: 'bar', orientation: 'h',
    marker: { color: COLORS.accent },
  }], baseLayout({
    margin: { t: 20, r: 20, b: 40, l: 180 },
    yaxis: { autorange: 'reversed' }, height: 380, showlegend: false,
  }), CFG);

  const cB = chartCard('Mean exposure when detected', '$ exposure on the day of first detection. Methods that detect early should be lower; later detection means more damage already done.');
  r2.appendChild(cB.wrap);
  const meanExp = methods.map(meth => {
    const rs = RINGS.filter(r => r.detection === meth);
    if (!rs.length) return 0;
    return rs.reduce((s, r) => s + r.daily_dollars[r.first_day], 0) / rs.length;
  });
  Plotly.newPlot(cB.plot, [{
    x: meanExp, y: methods.map(m_ => m_.replace(/_/g, ' ')),
    type: 'bar', orientation: 'h',
    marker: { color: meanExp.map(v => v > 5000 ? COLORS.bad : v > 2000 ? COLORS.warn : COLORS.good) },
  }], baseLayout({
    margin: { t: 20, r: 20, b: 40, l: 180 },
    yaxis: { autorange: 'reversed' }, height: 380, showlegend: false,
    xaxis: { tickformat: '$,.0s' },
  }), CFG);
  m.appendChild(r2);
};

/* -------------------- IMPACT -------------------- */
ROUTES['impact'] = () => {
  const m = main();
  m.appendChild(pageHeader(
    'Impact analysis',
    `Pareto and capture-rate breakdown. The top 20% of rings tend to drive 70%+ of dollar exposure — picking them off has outsize impact, but they are also the most defended (mature attackers, longer lifecycles, more cross-ring infrastructure).`
  ));

  // Pareto: rings sorted by exposure, with cumulative %
  const sorted = [...RINGS].sort((a, b) => b.$exp - a.$exp);
  const cum = []; let s = 0;
  sorted.forEach((r, i) => { s += r.$exp; cum.push({ k: i + 1, share: s / TOTAL_EXP, $: r.$exp }); });
  const c1 = chartCard('Pareto: rings by $ exposure',
    'Bars are individual ring exposure; line is cumulative share of total. Find the inflection point to size your top-N enforcement strategy.');
  m.appendChild(c1.wrap);
  Plotly.newPlot(c1.plot, [
    { x: cum.map(c => c.k), y: cum.map(c => c.$), type: 'bar', name: '$ exposure',
      marker: { color: COLORS.accent } },
    { x: cum.map(c => c.k), y: cum.map(c => c.share), yaxis: 'y2',
      type: 'scatter', mode: 'lines', name: 'cum share',
      line: { color: COLORS.bad, width: 2.5 } },
  ], baseLayout({
    yaxis: { title: '$ exposure', tickformat: '$,.0s' },
    yaxis2: { title: 'cum share', overlaying: 'y', side: 'right', tickformat: '.0%', range: [0, 1.05] },
    height: 380,
  }), CFG);

  // Capture rate by status
  const r2 = el('div', 'row2');
  const cA = chartCard('Capture rate by status', '');
  r2.appendChild(cA.wrap);
  const statuses = STATUSES;
  Plotly.newPlot(cA.plot, [{
    x: statuses.map(s => s),
    y: statuses.map(s => {
      const rs = RINGS.filter(r => r.status === s);
      const exp = rs.reduce((a, r) => a + r.$exp, 0);
      const cap = rs.reduce((a, r) => a + r.$cap, 0);
      return exp ? cap / exp : 0;
    }),
    type: 'bar', marker: { color: statuses.map(s => COLORS[s]) },
    text: statuses.map(s => {
      const rs = RINGS.filter(r => r.status === s);
      const exp = rs.reduce((a, r) => a + r.$exp, 0);
      const cap = rs.reduce((a, r) => a + r.$cap, 0);
      return fmtP(exp ? cap / exp : 0, 0);
    }),
    textposition: 'outside',
  }], baseLayout({
    yaxis: { tickformat: '.0%', range: [0, 1] }, showlegend: false,
    height: 320,
  }), CFG);

  const cB = chartCard('Exposure vs capture by archetype', '');
  r2.appendChild(cB.wrap);
  const archOrder = ARCH_ORDER;
  Plotly.newPlot(cB.plot, [
    { x: archOrder.map(a => ARCH_LABEL[a]),
      y: archOrder.map(a => RINGS.filter(r => r.arch === a).reduce((s, r) => s + r.$exp, 0)),
      type: 'bar', name: 'Exposure',
      marker: { color: archOrder.map(a => COLORS[a] + 'CC') } },
    { x: archOrder.map(a => ARCH_LABEL[a]),
      y: archOrder.map(a => RINGS.filter(r => r.arch === a).reduce((s, r) => s + r.$cap, 0)),
      type: 'bar', name: 'Captured',
      marker: { color: archOrder.map(a => COLORS[a]) } },
  ], baseLayout({
    yaxis: { title: '$', tickformat: '$,.0s' },
    barmode: 'overlay', height: 320,
  }), CFG);
  m.appendChild(r2);

  m.appendChild(makeCallout('Reading the Pareto',
    `${(cum.findIndex(c => c.share >= 0.7) + 1)} rings (${fmtP((cum.findIndex(c => c.share >= 0.7) + 1) / N_RINGS, 0)} of total) account for 70% of cumulative exposure. Whatever your enforcement budget, the question is whether it's allocated proportional to dollar impact or proportional to ring count — those are very different policies.`,
    'info'));
};

/* -------------------- INVESTIGATION QUEUE -------------------- */
ROUTES['queue'] = () => {
  const m = main();
  m.appendChild(pageHeader(
    'Investigation queue',
    `Rings actively under analyst review, sorted by triage priority (combined exposure × growth velocity × overlap with other rings).`
  ));

  // Investigating rings + monitoring rings, scored
  const open = RINGS.filter(r => r.status === 'investigating' || r.status === 'monitoring');
  open.forEach(r => {
    // Growth velocity: $ increase over last 7 days vs prior 7
    const last7 = r.daily_dollars.slice(-7).reduce((a, b) => a + b, 0);
    const prev7 = r.daily_dollars.slice(-14, -7).reduce((a, b) => a + b, 0);
    r.velocity = (last7 - prev7) / Math.max(prev7, 100);
    r.overlap_count = overlapEdges.filter(e => e.a === r.id || e.b === r.id).reduce((s, e) => s + e.count, 0);
    r.triage = (r.$exp / 1000) * (1 + Math.max(0, r.velocity)) * (1 + r.overlap_count * 0.1);
  });
  open.sort((a, b) => b.triage - a.triage);

  const kpis = el('div', 'kpis');
  kpis.innerHTML = `
    <div class="kpi kpi-bad"><div class="kpi-l">Open cases</div><div class="kpi-v">${open.length}</div><div class="kpi-s">investigating + monitoring</div></div>
    <div class="kpi kpi-warn"><div class="kpi-l">Open exposure</div><div class="kpi-v">${fmt$(open.reduce((s, r) => s + r.$exp, 0))}</div><div class="kpi-s">across open cases</div></div>
    <div class="kpi"><div class="kpi-l">High-velocity (lift &gt;30%)</div><div class="kpi-v">${open.filter(r => r.velocity > 0.3).length}</div><div class="kpi-s">growing fast week-over-week</div></div>
    <div class="kpi"><div class="kpi-l">High-overlap</div><div class="kpi-v">${open.filter(r => r.overlap_count >= 3).length}</div><div class="kpi-s">share infra with 3+ rings</div></div>
  `;
  m.appendChild(kpis);

  const tblWrap = el('div', 'chart-wrap');
  tblWrap.innerHTML = `<div class="chart-head"><div class="chart-t">Triage queue</div><div class="chart-s">Click a row for full ring focus.</div></div>`;
  const tbl = el('table', 'rt-tbl');
  tbl.innerHTML = `
    <thead><tr><th>Priority</th><th>Ring</th><th>Archetype</th><th>Status</th><th>Analyst</th><th>$ exposure</th><th>WoW growth</th><th>Overlap ties</th><th>Lifetime</th></tr></thead>
    <tbody>${open.slice(0, 25).map((r, i) => `
      <tr data-ring="${r.id}">
        <td><strong>${i + 1}</strong></td>
        <td><span class="ring-id">${r.id}</span></td>
        <td>${archPill(r.arch)}</td>
        <td>${statusPill(r.status)}</td>
        <td>${r.analyst}</td>
        <td>${fmt$(r.$exp)}</td>
        <td style="color:${r.velocity > 0.3 ? 'var(--bad)' : r.velocity > 0 ? 'var(--warn)' : 'var(--dim)'}">${r.velocity > 0 ? '+' : ''}${(r.velocity * 100).toFixed(0)}%</td>
        <td>${r.overlap_count}</td>
        <td>${r.lifetime}d</td>
      </tr>`).join('')}</tbody>
  `;
  tblWrap.appendChild(tbl);
  m.appendChild(tblWrap);
  tbl.querySelectorAll('tr[data-ring]').forEach(tr => {
    tr.onclick = () => navigate('focus', { r: tr.dataset.ring });
  });
};

/* ============================================================================
   Router + boot
   ============================================================================ */
function main() { return document.getElementById('main'); }
function navEl() { return document.getElementById('nav'); }
function crumbsEl() { return document.getElementById('crumbs'); }
function topEl() { return document.getElementById('topstats'); }

let currentPath = 'overview';
let currentParams = {};

function navigate(path, params) {
  // purge plotly elements
  main().querySelectorAll('div').forEach(d => { try { Plotly.purge(d); } catch (e) {} });
  currentPath = path;
  currentParams = params || {};
  const qs = new URLSearchParams(currentParams).toString();
  location.hash = '#/' + path + (qs ? '?' + qs : '');
  renderCrumbs();
  updateActive();
  render();
}

function render() {
  main().innerHTML = '';
  const fn = ROUTES[currentPath] || ROUTES['overview'];
  fn(currentParams);
}

function renderNav() {
  navEl().innerHTML = '';
  NAV.forEach(sec => {
    const e = el('div', 'nav-direct');
    e.dataset.path = sec.id;
    e.innerHTML = `<span>${sec.title}</span>${sec.badge ? `<span class="badge ${sec.badgeKind ? 'badge-' + sec.badgeKind : ''}">${sec.badge}</span>` : ''}`;
    e.onclick = () => navigate(sec.id);
    navEl().appendChild(e);
  });
  updateActive();
}
function updateActive() {
  document.querySelectorAll('.nav-direct').forEach(e => {
    e.classList.toggle('active', e.dataset.path === currentPath);
  });
}
function renderCrumbs() {
  let crumbs = ['<strong>Fraud Rings</strong>'];
  if (currentPath !== 'overview') {
    const sec = NAV.find(s => s.id === currentPath);
    crumbs.push('<span class="sep">›</span>');
    crumbs.push(`<strong>${sec?.title || currentPath}</strong>`);
    if (currentPath === 'focus' && currentParams.r) {
      crumbs.push('<span class="sep">›</span>');
      crumbs.push(`<span class="ring-id">${currentParams.r}</span>`);
    }
  }
  crumbsEl().innerHTML = crumbs.join(' ');
}
function renderTop() {
  topEl().innerHTML = `
    <div class="tstat"><span>Rings</span><strong>${N_RINGS}</strong></div>
    <span class="tstat-sep">·</span>
    <div class="tstat"><span>Active</span><strong>${ACTIVE_COUNT}</strong></div>
    <span class="tstat-sep">·</span>
    <div class="tstat"><span>$ exposure</span><strong>${fmt$(TOTAL_EXP)}</strong></div>
    <span class="tstat-sep">·</span>
    <div class="tstat"><span>Capture</span><strong>${fmtP(CAPTURE_RATE, 0)}</strong></div>
  `;
}

window.addEventListener('hashchange', () => {
  const h = location.hash.replace(/^#\/?/, '') || 'overview';
  const [p, qs] = h.split('?');
  const params = Object.fromEntries(new URLSearchParams(qs || ''));
  if (p !== currentPath || JSON.stringify(params) !== JSON.stringify(currentParams)) {
    currentPath = p; currentParams = params;
    renderCrumbs(); updateActive(); render();
  }
});
renderNav();
renderTop();
const initial = location.hash.replace(/^#\/?/, '') || 'overview';
const [p, qs] = initial.split('?');
currentPath = p;
currentParams = Object.fromEntries(new URLSearchParams(qs || ''));
renderCrumbs();
updateActive();
render();
</script>
</body>
</html>
